function toggleFallaFilter(tabId, filter, btn) {
  const st = fallaFilterState[tabId] || (fallaFilterState[tabId] = { MTO:true, OP:true });
  // No permitir desactivar ambos a la vez
  if (st[filter] && !st[filter === 'MTO' ? 'OP' : 'MTO']) return;
  st[filter] = !st[filter];
  if (btn) btn.classList.toggle('on', st[filter]);
  drawFallaPareto(tabId);
}

function drawFallaPareto(tabId) {
  const cache = fallaParetoCache[tabId]; if (!cache) return;
  const st = fallaFilterState[tabId] || { MTO:true, OP:true };
  const { fallasEqMTO, fallasEqOP, isPlanta, lineId } = cache;
  // Combinar segun filtro activo
  const combined = {};
  if (st.MTO) for (const [k,v] of Object.entries(fallasEqMTO)) combined[k] = (combined[k]||0) + v;
  if (st.OP)  for (const [k,v] of Object.entries(fallasEqOP))  combined[k] = (combined[k]||0) + v;

  const sorted = Object.entries(combined).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const tot = sorted.reduce((a,[,v])=>a+v,0);
  const limit = tot * 0.8; let cs=0; const pareto=[];
  for (const it of sorted) { pareto.push(it); cs += it[1]; if (cs >= limit) break; }

  const el = document.getElementById(`chart-${tabId}-mto`);
  if (!el) return;

  if (!pareto.length) {
    const lbl = st.MTO && st.OP ? 'Sin fallas' : `Sin fallas ${st.MTO?'MTO':'OP'}`;
    el.innerHTML = `<div class="no-data">${lbl}</div>`;
    return;
  }

  const cats = pareto.map(([k])=>k);
  const series = [];
  const colors = [];
  if (st.MTO) { series.push({ name:'MTO', data: cats.map(k => Number(((fallasEqMTO[k]||0)).toFixed(2))) }); colors.push('#D81840'); }
  if (st.OP)  { series.push({ name:'OP',  data: cats.map(k => Number(((fallasEqOP[k] ||0)).toFixed(2))) }); colors.push('#F08808'); }
  const mtoFlag = st.MTO ? (st.OP ? 'BOTH' : 'MTO') : 'OP';

  drawChart(`chart-${tabId}-mto`, {
    series,
    chart: { type:'bar', stacked:true, height:320, toolbar:{show:false}, foreColor:getTextColor(),
      events: { dataPointSelection: (e,c,cfg) => openModal(isPlanta?null:lineId, cfg.w.config.xaxis.categories[cfg.dataPointIndex], CATS.FALLA, mtoFlag) }
    },
    xaxis: { categories: cats, labels:{style:{fontSize:'10px'}, rotate:-25, rotateAlways:true} },
    colors,
    plotOptions: { bar:{ borderRadius:4, columnWidth:'50%' } },
    dataLabels: { enabled:true, formatter:v=>v?v+'h':'', style:{fontSize:'10px',colors:['#fff'], fontWeight:700} },
    legend: { show: series.length>1, position:'top', horizontalAlign:'right', fontSize:'11px', markers:{ width:10, height:10, radius:2 } },
    tooltip: { y:{ formatter: v => v.toFixed(2)+' h' } },
    grid: { borderColor:getGridColor(), strokeDashArray:4 }
  });
}

function openModal(lineId, subcat, clasif, mtoFlag) {
  const rows = filteredData.filter(r => {
    if (getClasif1(r) !== clasif) return false;
    if (getClasif2(r) !== subcat) return false;
    if (lineId && getLinea(r) !== lineId) return false;
    if (clasif === CATS.FALLA) {
      const m = getMTO(r);
      const isMTO = m.includes('MTO');
      const isINV = m.includes('INV');
      const isOP  = !isMTO && !isINV;
      if (mtoFlag === 'MTO' && !isMTO) return false;
      if (mtoFlag === 'OP'  && !isOP)  return false;
      if (mtoFlag === 'BOTH' && !(isMTO || isOP)) return false;
      if (!mtoFlag && !isMTO) return false; // backwards-compatible default
    }
    return true;
  });
  const totalH = rows.reduce((a,r)=>a+getVarTiempo(r),0);
  let html = `<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;gap:20px;">
    <div>
      <h2 style="font-size:18px;font-weight:800;color:var(--vspt-amber);text-transform:uppercase;">${subcat}</h2>

async function cargarPlanLookup() {
  if (planLookup !== null) return; // ya cargado o en caché
  planLookup = {};
  try {
    const res = await fetch(API_URL + '?tabla=plan');
    const j = await res.json();
    const rows = j.plan || j.data || [];
    rows.forEach(r => {
      const op      = String(get(r,'ORDEN SAP','Orden SAP','orden_sap','OP','Id. Producción','Id. Produccion','id_produccion')||'').trim();
      const art     = String(get(r,'ARTICULO','Articulo','articulo')||'').trim();
      const litros  = parseNum(get(r,'FINAL LITROS','Final Litros','final_litros','LITROS','Litros','litros'));
      const botellas= parseNum(get(r,'FINAL BOTELLAS','Final Botellas','final_botellas','BOTELLAS','Botellas','botellas'));
      if (op) planLookup[op] = { articulo: art || '—', litros, botellas };
    });
  } catch(e) {
    console.warn('[Plan lookup] error al cargar hoja plan:', e);
  }
}

// Parsea "articulo | formato" → {art, fmt}; maneja "S/D..." sin pipe
function parsePT(v) {
  const s = String(v || '').trim();
  if (!s) return { art: '—', fmt: '' };
  const i = s.indexOf('|');
  if (i < 0) return { art: s, fmt: '' };
  return { art: s.slice(0, i).trim() || '—', fmt: s.slice(i + 1).trim() };
}

<script>
/* ===== Asistente v15 (filtros + pestañas + voz + Gemini) ===== */
(function(){
  const COLORS={amarillo:'#F8C040',verde:'#98A040',rojo:'#D81840',azul:'#3b82f6',naranja:'#F08808',violeta:'#701F52',celeste:'#5DC7D1'};
  const MESES={enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,julio:7,agosto:8,septiembre:9,setiembre:9,octubre:10,noviembre:11,diciembre:12};
  const _n=s=>String(s==null?'':s).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
  function st(t,e){const el=document.getElementById('asistV-st');if(el){el.textContent=t||'';el.style.color=e?'#D81840':'var(--muted,#999)';}}
  function _anio(){ const e=document.getElementById('f-anio'); const y=e&&parseInt(e.value,10); return (y&&y>2000)?y:new Date().getFullYear(); }
  function _iso(y,m,d){ return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }
  function buscarFechas(t){
    const out=[],seen={}; let m;
    let rng=t.match(/(\d{1,2})\s+al\s+(\d{1,2})\s*(?:de\s+)?([a-z]{3,12})(?:\s+(?:de\s+)?(\d{4}))?/);
    if(rng){const mo=MESES[rng[3]];if(mo){let y=rng[4]?+rng[4]:_anio();[+rng[1],+rng[2]].forEach((d,k)=>{if(d>=1&&d<=31){const i=_iso(y,mo,d);if(!seen[i]){seen[i]=1;out.push({x:k,i});}}});}}
    let re=/\b(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?\b/g;
    while((m=re.exec(t))){const d=+m[1],mo=+m[2];let y=m[3]?+m[3]:_anio();if(y<100)y+=2000;if(d>=1&&d<=31&&mo>=1&&mo<=12){const i=_iso(y,mo,d);if(!seen[i]){seen[i]=1;out.push({x:m.index,i});}}}
    re=/\b(\d{1,2})\s*(?:de\s+)?([a-z]{3,12})(?:\s+(?:de\s+)?(\d{4}))?\b/g;

  function parse(txt){
    const t=_n(txt); if(!t) return null;
    if(/(limpi|borr|reset).*(filtro)|^limpiar filtros|^limpiar$/.test(t)) return {a:'clear'};
    if(/(programa)/.test(t)) return {a:'tab',v:'programas'};
    if(/(calidad|desvi)/.test(t)) return {a:'tab',v:'calidad'};
    if(/objetivo/.test(t)) return {a:'tab',v:'objetivos'};
    if(/\bplanta\b/.test(t) && /(mostr|ver|ir|pesta|abri|anda)/.test(t)) return {a:'tab',v:'planta'};
    if(/(linea\s*1|\bl1\b)/.test(t)) return {a:'tab',v:'l1'};
    if(/(linea\s*2|\bl2\b)/.test(t)) return {a:'tab',v:'l2'};
    if(/(linea\s*3|\bl3\b)/.test(t)) return {a:'tab',v:'l3'};
    const f={}; let m;
    m=t.match(/sem(?:ana)?\s*0*(\d{1,2})/); if(m) f['f-semana']=String(+m[1]);
    m=t.match(/turno\s*(tm|tt|tn)/); if(!m && /turno/.test(t)){const x=t.match(/\b(tm|tt|tn)\b/); if(x)m=x;} if(m&&m[1]) f['f-turno']=m[1].toUpperCase();
    m=t.match(/\bop\s*0*(\d{3,})/); if(m) f['f-op']=m[1];
    for(const k in MESES){ if(new RegExp('\\b'+k+'\\b').test(t)){ f['f-periodo']=k.toUpperCase(); break; } }
    if(/anual|ytd|todo el an|todos los mes/.test(t)) f['f-periodo']='ALL';
    const fs=buscarFechas(t); if(fs.length){ f['f-desde']=fs[0]; f['f-hasta']=fs[1]||fs[0]; }
    ['f-clasif','f-subclasif','f-tipoeti','f-formato','f-mto'].forEach(id=>{
      const sel=document.getElementById(id); if(!sel) return;
      for(const o of sel.options){ const ov=_n(o.value); if(ov && ov.length>2 && t.includes(ov)){ f[id]=o.value; break; } }
    });
    return Object.keys(f).length ? {a:'filtros',f} : null;
  }
  function apply(act){

    let f=act.f || act.filtros || null;
    if(!f && act.accion==='fechas'){ f={'f-desde':act.desde,'f-hasta':act.hasta||act.desde}; }
    if(f && typeof f==='object'){

        else { el.value=String(f[id]); }

    out+='## Cambios de formato (top 40 duracion)\n'+_rowsCSV(['fecha','linea','pt_a','pt_b','duracion_h'], camb.map(c=>[c.f,c.l,c.a,c.b,c.h.toFixed(2)]))+'\n\n';

    out+='## Fallas equipo x mes\n'+_rowsCSV(['falla','mes','eventos','horas'], fs.map(g=>[g.c2,g.mes,g.n,g.h.toFixed(1)]))+'\n\n';

<style id="vsptBot-css">
#vsptBot{position:fixed;right:18px;bottom:18px;z-index:80;font-family:'Montserrat',system-ui,sans-serif}
#vsptBot-launcher{background:transparent;border:none;padding:0;cursor:pointer;position:relative;display:block;line-height:0;filter:drop-shadow(0 6px 10px rgba(0,0,0,.45))}
body.light #vsptBot-launcher{filter:drop-shadow(0 6px 9px rgba(0,0,0,.26))}
@keyframes vbFlotar{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes vbBalanceo{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes vbBounce{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes vbLee{0%,100%{transform:rotate(0)}50%{transform:rotate(2deg)}}
#vsptBot-badge{position:absolute;top:2px;right:2px;width:11px;height:11px;border-radius:50%;background:#D81840;border:2px solid #fff;animation:vbPulso 1.4s ease-in-out infinite}
@keyframes vbPulso{0%,100%{box-shadow:0 0 0 0 rgba(216,24,64,.6)}50%{box-shadow:0 0 0 5px rgba(216,24,64,0)}}
#vsptBot-panel{position:absolute;right:0;bottom:calc(100% + 10px);width:360px;max-height:70vh;display:flex;flex-direction:column;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:0 18px 50px rgba(0,0,0,.45);overflow:hidden}
#vsptBot-panel[hidden]{display:none}
.vb-head{display:flex;align-items:center;gap:8px;padding:10px 14px;background:linear-gradient(135deg,#4E1742,#D81840);color:#fff;font-size:13px;font-weight:700}
.vb-head button{margin-left:auto;background:transparent;border:none;color:#fff;font-size:20px;line-height:1;cursor:pointer;padding:0 2px}
#vsptBot .vb-chat{flex:1;overflow-y:auto;padding:8px 12px;min-height:60px;position:relative;font-size:12px}
#vsptBot .vb-st{padding:2px 14px;font-size:11px;color:var(--muted);min-height:14px}
.vb-row{display:flex;gap:6px;align-items:center;padding:8px 12px;border-top:1px solid var(--border)}
.vb-row input{flex:1;min-width:0;background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:7px 10px;font-size:12px;outline:none;font-family:inherit}
.vb-row button{flex:0 0 auto;background:transparent;border:1px solid var(--border);color:var(--text);border-radius:7px;padding:6px 9px;cursor:pointer;font-size:12px}
.vb-row button.vb-go{background:linear-gradient(135deg,#4E1742,#D81840);border:none;color:#fff;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:6px 10px;font-size:11px}
.vb-fig{position:relative;display:block;height:107px;width:39px;margin:0 auto;animation:vbFlotar 3s ease-in-out infinite}
.vb-fig img{position:absolute;bottom:0;left:50%;transform:translateX(-50%);height:100%;width:auto;opacity:0;transition:opacity .9s ease;pointer-events:none;-webkit-user-drag:none}
#vsptBot[data-variedad="tinto"] .vb-fig img[data-v="tinto"]{opacity:1}
#vsptBot[data-variedad="rojo"] .vb-fig img[data-v="rojo"]{opacity:1}
#vsptBot[data-variedad="durazno"] .vb-fig img[data-v="durazno"]{opacity:1}
#vsptBot[data-variedad="naranja"] .vb-fig img[data-v="naranja"]{opacity:1}
#vsptBot[data-variedad="rosado"] .vb-fig img[data-v="rosado"]{opacity:1}
#vsptBot[data-variedad="blanco"] .vb-fig img[data-v="blanco"]{opacity:1}
#vsptBot.pensando .vb-fig{animation:vbFlotar 3s ease-in-out infinite,vbBalanceo 1.2s ease-in-out infinite}
#vsptBot.respondiendo .vb-fig{animation:vbBounce .6s ease}
#vsptBot.leyendo .vb-fig{animation:vbFlotar 3s ease-in-out infinite,vbLee 1s ease-in-out infinite}
#vsptBot-launcher::after{content:"";position:absolute;left:50%;bottom:-4px;transform:translateX(-50%);width:26px;height:6px;border-radius:50%;background:rgba(0,0,0,.35);filter:blur(2px);animation:vbSombra 3s ease-in-out infinite;z-index:-1}
@keyframes vbSombra{0%,100%{transform:translateX(-50%) scaleX(1);opacity:.5}50%{transform:translateX(-50%) scaleX(.78);opacity:.3}}
/* ===== cara Clippy ===== */
.vb-cara{position:absolute;left:50%;top:31%;transform:translateX(-50%);width:24px;height:22px;pointer-events:none}
.vb-ojo{animation:vbParpadeo 4.6s ease-in-out infinite;transform-origin:center 40%}
.vb-pupilas{animation:vbMirada 9s ease-in-out infinite}
#vsptBot.pensando .vb-pupilas{animation:none;transform:translate(0.6px,-1.6px)}
#vsptBot.pensando .vb-ceja{transform:translateY(-1.1px)}
.vb-ceja{transition:transform .4s ease}
.vb-boca-sonrisa,.vb-boca-o,.vb-boca-habla{transition:opacity .3s ease}
.vb-boca-o,.vb-boca-habla{opacity:0}
#vsptBot.pensando .vb-boca-sonrisa{opacity:0}
#vsptBot.pensando .vb-boca-o{opacity:1}
#vsptBot.leyendo .vb-boca-sonrisa{opacity:0}
#vsptBot.leyendo .vb-boca-habla{opacity:1}
.vb-boca-habla{transform-origin:center;animation:vbHabla .28s ease-in-out infinite alternate}
@keyframes vbParpadeo{0%,3.5%,7%,100%{transform:scaleY(1)}1.7%,5.2%{transform:scaleY(.08)}}
@keyframes vbMirada{0%,26%,100%{transform:translate(0,0)}32%,48%{transform:translate(1.1px,.2px)}56%,72%{transform:translate(-1.1px,.3px)}80%,92%{transform:translate(0,-.4px)}}
@keyframes vbHabla{from{transform:scaleY(.25)}to{transform:scaleY(1)}}
@media (prefers-reduced-motion:reduce){.vb-fig,.vb-ojo,.vb-pupilas,.vb-boca-habla,#vsptBot-launcher::after{animation:none!important}}
@media (max-width:480px){#vsptBot-panel{width:calc(100vw - 24px);max-height:80vh;right:-6px}.vb-fig{height:95px}}
</style>
</body>
