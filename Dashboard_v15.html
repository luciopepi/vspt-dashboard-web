<title>VSPT OPINONA — San Juan/Graffigna</title>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300..900;1,400..700&display=swap" rel="stylesheet">
<style>
  :root {
    /* VSPT Propósito — paleta oficial */
    --vspt-deep-purple:#4E1742;
    --vspt-wine:#701F52;
    --vspt-plum:#301030;
    --vspt-crimson:#D81840;
    --vspt-magenta:#B61858;
    --vspt-beige:#E0D0B8;
    --vspt-beige-soft:#F3F1EB;
    --vspt-cream:#FAF7F0;
    --vspt-olive:#98A040;
    --vspt-orange:#F08808;
    --vspt-yellow:#F8C040;
    --vspt-red-deep:#9B1D4F;

    /* Aliases legacy → VSPT (no romper código existente) */
    --vspt-red:var(--vspt-crimson);
    --vspt-amber:var(--vspt-yellow);
    --vspt-purple:var(--vspt-plum);

    /* Dark mode (modo planta / TV) — neutros cálidos tipo Claude/Programas */
    --bg:#1A1915;
    --card:#222220;
    --card2:#2A2A28;
    --border:rgba(200,168,130,0.14);
    --text:#F3F1EB;
    --muted:#c9b8c4;
    --th-bg:#3a1f33;
    --tr-hover:rgba(216,24,64,0.06);
    --td-border:rgba(255,255,255,0.07);
    --chart-tick:#c9b8c4;
    --chart-grid:rgba(255,255,255,0.07);
    --green:var(--vspt-olive);
    --tab-color:var(--vspt-yellow);

    /* Gradientes signature */
    --grad-hero:linear-gradient(135deg, var(--vspt-yellow) 0%, var(--vspt-orange) 35%, var(--vspt-crimson) 70%, var(--vspt-deep-purple) 100%);
    --grad-wine:linear-gradient(90deg, var(--vspt-crimson), var(--vspt-wine), var(--vspt-plum));
    --grad-bird:linear-gradient(135deg, var(--vspt-crimson), var(--vspt-deep-purple), var(--vspt-crimson));
  }
  body.light {
    --bg:var(--vspt-beige-soft);
    --card:#FFFFFF;
    --card2:var(--vspt-cream);
    --border:rgba(78,23,66,0.14);
    --text:var(--vspt-plum);
    --muted:#7a627a;
    --th-bg:var(--vspt-beige-soft);
    --tr-hover:rgba(78,23,66,0.05);
    --td-border:rgba(78,23,66,0.08);
    --chart-tick:#7a627a;
    --chart-grid:rgba(78,23,66,0.08);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Montserrat',system-ui,sans-serif; font-size:14px; font-feature-settings:'tnum' 1; transition:background .3s,color .3s; }

  .header { position:relative; background:linear-gradient(135deg,var(--vspt-plum) 0%,var(--vspt-deep-purple) 55%,var(--vspt-wine) 100%); border-bottom:3px solid var(--vspt-crimson); padding:14px 28px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; overflow:hidden; min-height:78px; }
  .header > * { position:relative; z-index:2; }
  .header-bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center; opacity:var(--tw-header-img-opacity, 0.55); z-index:1; pointer-events:none; transition:opacity .35s; }
  .header::after { content:''; position:absolute; inset:0; z-index:1; background:linear-gradient(90deg, rgba(48,16,48,0.55) 0%, rgba(78,23,66,0.30) 50%, rgba(48,16,48,0.55) 100%); pointer-events:none; }
  body.light .header { background:linear-gradient(135deg,var(--vspt-deep-purple) 0%,var(--vspt-wine) 100%); }
  body.light .header-bg { opacity:0.85; }
  body.light .header::after { background:linear-gradient(90deg, rgba(48,16,48,0.10) 0%, rgba(78,23,66,0.00) 40%, rgba(48,16,48,0.10) 100%); }
  .header-left { display:flex; align-items:center; gap:16px; }
  .logo { width:48px; height:48px; background:#fff; border-radius:12px; display:flex; align-items:center; justify-content:center; padding:5px; box-shadow:0 6px 18px rgba(0,0,0,0.30); overflow:hidden; }
  .logo img { width:100%; height:100%; object-fit:contain; display:block; }
  .header-title { font-size:18px; font-weight:700; letter-spacing:-0.2px; color:#fff; }
  .header-title span { color:var(--vspt-beige); font-weight:600; }
  .header-sub { font-size:10px; color:var(--vspt-beige); margin-top:4px; text-transform:uppercase; letter-spacing:0.22em; font-weight:600; }
  .header-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .status-badge { display:flex; align-items:center; gap:7px; background:rgba(152,160,64,0.18); border:1px solid rgba(152,160,64,0.4); color:#c5cf6e; padding:6px 13px; border-radius:20px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.12em; }
  .status-dot { width:7px; height:7px; border-radius:50%; background:var(--vspt-olive); animation:pulse 2s infinite; }
  .status-badge.amber { background:rgba(248,192,64,0.18); border-color:rgba(248,192,64,0.4); color:var(--vspt-yellow); }
  .status-badge.amber .status-dot { background:var(--vspt-yellow); }
  .status-badge.red { background:rgba(216,24,64,0.18); border-color:rgba(216,24,64,0.45); color:#ff7a93; }
  .status-badge.red .status-dot { background:var(--vspt-crimson); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .btn-icon { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.18); color:#fff; padding:7px 14px; border-radius:20px; cursor:pointer; font-size:11px; font-weight:600; letter-spacing:0.06em; transition:all .2s; font-family:inherit; }
  .year-toggle { display:inline-flex; background:rgba(0,0,0,0.28); border:1px solid rgba(248,192,64,0.28); border-radius:20px; padding:3px; gap:2px; }
  .year-btn { background:transparent; border:none; color:rgba(255,255,255,0.7); padding:5px 14px; border-radius:16px; cursor:pointer; font-size:11px; font-weight:700; font-family:inherit; transition:all .2s; letter-spacing:0.06em; }
  .year-btn:hover { color:#fff; }
  .year-btn.active { background:var(--vspt-crimson); color:#fff; box-shadow:0 2px 8px rgba(216,24,64,0.4); }
  .btn-icon:hover { background:var(--vspt-crimson); color:#fff; border-color:var(--vspt-crimson); }

  .tab-nav { background:var(--card); border-bottom:1px solid var(--border); display:flex; overflow-x:auto; padding:0 12px; position:sticky; top:0; z-index:40; }
  .tab-btn { padding:15px 22px; font-weight:700; color:var(--muted); border-bottom:3px solid transparent; cursor:pointer; text-transform:uppercase; font-size:11px; letter-spacing:0.14em; white-space:nowrap; transition:all .25s; background:transparent; border-top:none; border-left:none; border-right:none; font-family:inherit; }
  .tab-btn:hover { color:var(--text); background:var(--tr-hover); }
  .tab-btn.active { color:var(--tab-color,var(--vspt-crimson)); border-bottom-color:var(--tab-color,var(--vspt-crimson)); background:linear-gradient(to top,rgba(216,24,64,0.08),transparent); }

  .main { display:flex; min-height:calc(100vh - 110px); position:relative; }
  .sidebar { width:260px; min-width:260px; background:var(--card); border-right:1px solid var(--border); overflow-y:auto; overflow-x:visible; padding:18px; flex-shrink:0; transition:margin-left .3s ease; position:relative; }
  .sidebar.collapsed { margin-left:-260px; }
  .content { flex:1; overflow-y:auto; padding:20px 24px; min-width:0; }
  .sidebar-toggle { position:absolute; left:260px; top:14px; transform:translateX(-14px); width:28px; height:28px; border-radius:50%; background:var(--card2); border:1px solid var(--border); color:var(--vspt-amber); cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:900; z-index:50; font-family:inherit; transition:left .3s ease, background .2s, color .2s; box-shadow:0 2px 8px rgba(0,0,0,0.25); }
  .main.sb-collapsed .sidebar-toggle { left:0; transform:translateX(0); }
  .sidebar-toggle:hover { background:var(--vspt-amber); color:var(--vspt-purple); }

  .sidebar h3 { font-size:11px; text-transform:uppercase; letter-spacing:0.22em; color:var(--vspt-crimson); margin-bottom:14px; margin-top:4px; font-weight:700; }
  body.light .sidebar h3 { color:var(--vspt-deep-purple); }
  .filter-group { margin-bottom:13px; }
  .filter-label { font-size:10px; color:var(--muted); margin-bottom:5px; display:block; text-transform:uppercase; letter-spacing:0.5px; font-weight:700; }
  .filter-group select, .filter-group input[type=date], .filter-group input[type=text], .filter-group input[type=number] {
    width:100%; background:var(--card2); border:1px solid var(--border); color:var(--text);
    border-radius:7px; padding:8px 10px; font-size:12px; outline:none; font-family:inherit; transition:border-color .2s;
  }
  .filter-group input[type=date] { color-scheme: light dark; min-width:0; cursor:pointer; }
  body.dark .filter-group input[type=date] { color-scheme: dark; }
  body.light .filter-group input[type=date] { color-scheme: light; }
  .filter-group input[type=date]::-webkit-calendar-picker-indicator { cursor:pointer; opacity:0.85; filter: var(--date-icon-filter, invert(0.7)); }
  body.light .filter-group input[type=date]::-webkit-calendar-picker-indicator { filter: none; opacity:0.6; }
  .filter-group select:focus, .filter-group input:focus { border-color:var(--vspt-amber); }
  .filter-group select option { background:var(--card); }
  body.light .filter-group select option { background:#fff; color:var(--text); }
  .date-row { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .date-row input { width:100%; }
  /* Multi-select con checkboxes */
  .ms { position:relative; }
  .ms-native { display:none; }
  .ms-btn { width:100%; display:flex; align-items:center; justify-content:space-between; gap:8px; background:var(--card2); border:1px solid var(--border); border-radius:7px; padding:8px 10px; color:var(--text); font-family:inherit; font-size:12px; cursor:pointer; text-align:left; transition:border-color .2s; }
  .ms-btn:hover, .ms.open .ms-btn { border-color:var(--vspt-amber); }
  .ms-text { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .ms-text.placeholder { color:var(--muted); }
  .ms-caret { color:var(--muted); font-size:9px; flex-shrink:0; transition:transform .2s; }
  .ms.open .ms-caret { transform:rotate(180deg); }
  .ms-panel { display:none; position:absolute; z-index:60; top:calc(100% + 4px); left:0; right:0; max-height:260px; overflow-y:auto; background:var(--card); border:1px solid var(--border); border-radius:8px; box-shadow:0 12px 30px rgba(0,0,0,0.35); padding:6px; }
  .ms.open .ms-panel { display:block; }
  .ms-actions { display:flex; gap:6px; padding:2px 2px 6px; border-bottom:1px solid var(--border); margin-bottom:4px; }
  .ms-act { flex:1; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; padding:4px 6px; border-radius:6px; border:1px solid var(--border); background:var(--card2); color:var(--muted); cursor:pointer; font-family:inherit; }
  .ms-act:hover { color:var(--text); border-color:var(--vspt-amber); }
  .ms-opt { display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:6px; cursor:pointer; font-size:12px; color:var(--text); }
  .ms-opt:hover { background:var(--card2); }
  .ms-opt input { accent-color:var(--vspt-amber); cursor:pointer; margin:0; flex-shrink:0; }
  .ms-opt span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ms.disabled { opacity:0.45; pointer-events:none; }
  .clear-btn { width:100%; background:linear-gradient(135deg,var(--vspt-deep-purple),var(--vspt-crimson)); border:none; color:#fff; border-radius:8px; padding:11px; font-size:11px; font-weight:700; cursor:pointer; margin-top:10px; transition:opacity .2s; text-transform:uppercase; letter-spacing:0.18em; font-family:inherit; }
  .clear-btn:hover { opacity:0.88; }
  .filter-divider { height:1px; background:var(--border); margin:14px 0; }

  .kpi-row { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:18px; }
  .kpi-card { background:var(--card); border:1px solid var(--border); border-radius:var(--tw-rad-card,12px); padding:var(--tw-kpi-pad,16px); position:relative; overflow:hidden; transition:transform .2s, box-shadow .2s; box-shadow:var(--tw-card-shadow, none); }
  .kpi-card:hover { transform:translateY(-2px); }
  .kpi-card::before { content:''; position:absolute; top:0; left:0; right:0; height:var(--tw-kpi-top,3px); background:var(--grad-wine); }
  .kpi-card.amber::before { background:linear-gradient(90deg,var(--vspt-yellow),var(--vspt-orange)); }
  .kpi-card.wine::before  { background:linear-gradient(90deg,var(--vspt-wine),var(--vspt-deep-purple)); }
  .kpi-card.olive::before { background:linear-gradient(90deg,var(--vspt-olive),#c5cf6e); }
  .kpi-card.red::before   { background:linear-gradient(90deg,var(--vspt-crimson),var(--vspt-magenta)); }
  .kpi-card.orange::before{ background:linear-gradient(90deg,var(--vspt-orange),var(--vspt-yellow)); }
  .kpi-card.cream::before { background:linear-gradient(90deg,var(--vspt-beige),var(--vspt-yellow)); }
  .kpi-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.18em; margin-bottom:6px; font-weight:600; }
  .kpi-value { font-size:var(--tw-kpi-value,30px); font-weight:700; letter-spacing:-0.02em; line-height:1.05; font-variant-numeric:tabular-nums; }
  .kpi-value.amber { color:var(--vspt-yellow); }
  .kpi-value.wine { color:#e2a4cf; } body.light .kpi-value.wine { color:var(--vspt-wine); }
  .kpi-value.olive { color:#c5cf6e; } body.light .kpi-value.olive { color:var(--vspt-olive); }
  .kpi-value.red { color:var(--vspt-red); }
  .kpi-value.orange { color:var(--vspt-orange); }
  .kpi-value.cream { color:#EDE0C4; } body.light .kpi-value.cream { color:#b89b5a; }
  .kpi-sub { font-size:11px; color:var(--muted); margin-top:6px; }

  .kpi-hero { text-align:center; border:1.5px solid var(--vspt-yellow); background:linear-gradient(135deg,rgba(248,192,64,0.10),rgba(240,136,8,0.04)); padding:var(--tw-hero-pad,26px 18px); }
  .kpi-hero.below { border-color:var(--vspt-crimson); background:linear-gradient(135deg,rgba(216,24,64,0.10),rgba(78,23,66,0.04)); }
  .kpi-hero .kpi-value { font-size:var(--tw-hero-value,52px); margin-top:8px; font-weight:800; letter-spacing:-0.03em; }
  .kpi-hero .kpi-label { font-size:11px; letter-spacing:0.22em; }
  .kpi-hero .meta { font-size:11px; color:var(--muted); margin-top:12px; font-weight:600; letter-spacing:0.04em; }
  .kpi-hero .meta strong { color:var(--vspt-yellow); font-weight:700; }

  .charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
  .charts-grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:14px; }
  .chart-card { background:var(--card); border:1px solid var(--border); border-top:var(--tw-top-bar,3px) solid var(--tab-color,var(--vspt-crimson)); border-radius:var(--tw-rad-card,14px); padding:var(--tw-card-pad,18px); box-shadow:var(--tw-card-shadow, 0 2px 10px rgba(48,16,48,0.10)); }
  .chart-card.full { grid-column:1 / -1; }
  .chart-card.accent { border-top-color:var(--vspt-yellow); }
  .chart-card.wine   { border-top-color:var(--vspt-wine); }
  .chart-card.red    { border-top-color:var(--vspt-crimson); }
  .chart-card.olive  { border-top-color:var(--vspt-olive); }

  /* Bordes superiores unificados con el color de la pestaña activa (Planta/L1/L2/L3) */
  #tab-planta .kpi-card::before,
  #tab-l1 .kpi-card::before,
  #tab-l2 .kpi-card::before,
  #tab-l3 .kpi-card::before {
    background: var(--tab-color, var(--vspt-crimson)) !important;
  }
  #tab-planta .chart-card,
  #tab-l1 .chart-card,
  #tab-l2 .chart-card,
  #tab-l3 .chart-card {
    border-top-color: var(--tab-color, var(--vspt-crimson)) !important;
  }
  .chart-title { font-size:11px; font-weight:var(--tw-title-weight,700); color:var(--text); text-transform:uppercase; letter-spacing:var(--tw-title-spacing,0.18em); margin-bottom:14px; display:flex; align-items:baseline; gap:10px; }
  .chart-title .hint { color:var(--muted); font-weight:500; text-transform:none; letter-spacing:0; font-size:10px; }
  .chart-linea-badge { display:inline-block; padding:1px 7px; border-radius:4px; font-size:9px; font-weight:900; letter-spacing:0.1em; vertical-align:middle; line-height:1.7; flex-shrink:0; }
  .falla-filter-btn { font-family:inherit; font-size:11px; font-weight:700; letter-spacing:0.08em; padding:5px 12px; border-radius:999px; border:1px solid var(--border); background:var(--card2); color:var(--muted); cursor:pointer; transition:all .15s ease; text-transform:uppercase; }
  .falla-filter-btn:hover { border-color:var(--vspt-crimson); color:var(--text); }
  .falla-filter-btn.on { background:var(--vspt-crimson); border-color:var(--vspt-crimson); color:#fff; box-shadow:0 0 0 1px rgba(216,24,64,0.25); }
  .falla-filter-btn[data-filter="OP"].on { background:#F08808; border-color:#F08808; box-shadow:0 0 0 1px rgba(240,136,8,0.25); }

  /* Selector de granularidad para OPINONA (Diario / Semanal / Mensual) */
  .opi-view-switch { background:var(--card2); border:1px solid var(--border); border-radius:999px; padding:3px; }
  .opi-view-btn { font-family:inherit; font-size:11px; font-weight:700; letter-spacing:0.06em; padding:5px 12px; border-radius:999px; border:none; background:transparent; color:var(--muted); cursor:pointer; transition:all .15s ease; }
  .opi-view-btn:hover { color:var(--text); }
  .opi-view-btn.on { background:var(--tab-color, var(--vspt-crimson)); color:#fff; box-shadow:0 1px 4px rgba(0,0,0,0.12); }

  .section-title { font-size:12px; font-weight:var(--tw-title-weight,700); color:var(--text); margin:14px 0 14px; padding-bottom:10px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; text-transform:uppercase; letter-spacing:var(--tw-title-spacing,0.18em); }
  .section-title::before { content:''; width:4px; height:18px; background:var(--grad-wine); border-radius:2px; }

  .spinner-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; height:360px; gap:16px; }
  .spinner { width:46px; height:46px; border:3px solid var(--border); border-top-color:var(--vspt-amber); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .no-data { text-align:center; color:var(--muted); padding:50px; font-size:13px; }

  .table-obj { width:100%; border-collapse:collapse; font-size:13px; }
  .table-obj th { background:var(--th-bg); color:var(--muted); padding:12px; text-align:center; font-weight:700; text-transform:uppercase; font-size:10px; letter-spacing:0.6px; border-bottom:2px solid var(--border); }
  .table-obj th:first-child, .table-obj td:first-child { text-align:left; }
  .table-obj td { padding:14px 12px; border-bottom:1px solid var(--td-border); text-align:center; font-weight:700; }
  .table-obj tr:hover td { background:var(--tr-hover); }
  .input-obj { background:var(--card2); border:1px solid var(--vspt-yellow); color:var(--text); border-radius:6px; padding:6px 10px; font-weight:700; font-size:14px; text-align:center; width:80px; outline:none; font-family:inherit; }
  .admin-btn { background:transparent; border:1px solid var(--vspt-crimson); color:var(--vspt-crimson); padding:7px 14px; border-radius:8px; cursor:pointer; font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:0.18em; font-family:inherit; transition:all .2s; }
  body.dark .admin-btn { color:#ff7a93; border-color:rgba(216,24,64,0.6); }
  .admin-btn:hover, .admin-btn.active { background:var(--vspt-crimson); color:#fff; border-color:var(--vspt-crimson); }

  .modal-content td { padding:10px; border-bottom:1px solid var(--td-border); vertical-align:top; }
  .close-btn { background:transparent; border:none; color:var(--muted); font-size:28px; cursor:pointer; line-height:1; font-family:inherit; }

  .apexcharts-tooltip { background:var(--card) !important; border:1px solid var(--vspt-amber) !important; color:var(--text) !important; box-shadow:0 10px 30px rgba(0,0,0,0.45) !important; }
  .apexcharts-tooltip-title { background:var(--card2) !important; border-bottom:1px solid var(--border) !important; font-weight:800 !important; color:var(--text) !important; }

  .collapse-btn { width:100%; background:var(--card); border:1px dashed var(--border); color:var(--text); padding:11px 16px; margin:14px 0 0; border-radius:10px; font-family:inherit; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; cursor:pointer; display:flex; align-items:center; justify-content:space-between; transition:all .2s; }
  .collapse-btn:hover { border-color:var(--tab-color,var(--vspt-amber)); border-style:solid; color:var(--tab-color,var(--vspt-amber)); }

  /* Cinematic backdrop & chart saturation filter */
  body { position:relative; }
  body::before { content:''; position:fixed; inset:0; background:var(--tw-backdrop, none); pointer-events:none; z-index:0; transition:background .4s; }

  /* ============================================================ */

  body.light #tweaks-panel { background:rgba(255,255,255,0.96); }
  body.dark #tweaks-panel { background:rgba(34,34,32,0.96); }
  .tw-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid var(--border); }
  .tw-eyebrow { font-size:9px; font-weight:700; color:var(--vspt-crimson); text-transform:uppercase; letter-spacing:0.28em; margin-bottom:4px; }
  body.dark .tw-eyebrow { color:#ff7a93; }
  .tw-title { font-size:18px; font-weight:700; letter-spacing:-0.01em; color:var(--text); }

  .tw-radio { display:grid; grid-template-columns:1fr; gap:6px; }

  .tw-chip-name { font-size:13px; font-weight:700; color:var(--text); margin-bottom:2px; }

  .tw-slider { width:100%; -webkit-appearance:none; appearance:none; height:4px; background:linear-gradient(90deg, #c9b8c4, var(--vspt-crimson), var(--vspt-yellow)); border-radius:2px; outline:none; margin:6px 0 4px; }
  .tw-slider::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:#fff; border:2px solid var(--vspt-crimson); cursor:pointer; box-shadow:0 2px 6px rgba(216,24,64,0.45); }
  .tw-slider::-moz-range-thumb { width:18px; height:18px; border-radius:50%; background:#fff; border:2px solid var(--vspt-crimson); cursor:pointer; box-shadow:0 2px 6px rgba(216,24,64,0.45); }
  .tw-slider-track { display:flex; justify-content:space-between; font-size:9px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.12em; margin-top:4px; }
  .tw-reset { background:transparent; border:1px solid var(--border); color:var(--muted); padding:8px 14px; border-radius:8px; font-family:inherit; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.18em; cursor:pointer; transition:all .2s; }
  .tw-reset:hover { border-color:var(--vspt-crimson); color:var(--vspt-crimson); }

  @media (max-width:1400px) { .kpi-row { grid-template-columns:repeat(3,1fr); } }
  @media (max-width:1100px) {

  .filter-locked select, .filter-locked input { cursor:not-allowed; }
  .kpi-loading-hint { text-align:center; color:var(--muted); font-size:12px; padding:18px; font-style:italic; opacity:0.8; }
</style>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx8alYmoiwb5-z1nyvXfyCSLfELACGZ4qGGtIoS3j6lF1yS6SmFH0wYRbKfQPrq5P6N/exec";
const CACHE_KEY = 'vspt_opinona_v6';
const CACHE_KPI_KEY = 'vspt_kpi_planta_v1';
let kpiData = [];          // filas de KPI_PLANTA_MENSUAL
let opinonaCargada = false; // true cuando llega OPINONA cruda
const MESES_ORDEN_NUM = { 1:'ENERO',2:'FEBRERO',3:'MARZO',4:'ABRIL',5:'MAYO',6:'JUNIO',7:'JULIO',8:'AGOSTO',9:'SEPTIEMBRE',10:'OCTUBRE',11:'NOVIEMBRE',12:'DICIEMBRE' };
const TARGETS_KEY = 'vspt_targets_v5';

let rawData = [];
let filteredData = [];
let planLookup = null;  // null = no cargado; {} = cargado (OP → artículo)
let charts = {};
let pendingCharts = {};
let activeTab = 'planta';
let activeYear = 2026;
let isDark = false;
let isAdmin = false;
let fallaParetoCache = {};
let fallaFilterState = {};
let opiViewState = {}; // tabId -> 'M'|'W'|'D'

// ============================================================
// TWEAKS PANEL — expressive controls
// ============================================================
const VSPT_TWEAKS = /*EDITMODE-BEGIN*/{
  "mood": "boardroom",
  "chromaEnergy": 60,
  "geometry": "soft"
}/*EDITMODE-END*/;
let tweaksState = { ...VSPT_TWEAKS };
let tweaksOpen = false;

function applyTweaks() {
  const root = document.documentElement;
  const { mood, chromaEnergy, geometry } = tweaksState;

  // Mood — density, contrast, hero size
  const moods = {
    'boardroom':  { padCard:'18px', padSection:'14px 28px', heroValue:'52px', heroPad:'26px 18px', kpiValue:'30px', kpiPad:'16px', titleSpacing:'0.18em', cardShadow:'0 2px 10px rgba(48,16,48,0.10)', backdrop:'none' },
    'ops-floor':  { padCard:'14px', padSection:'10px 22px', heroValue:'62px', heroPad:'22px 14px', kpiValue:'34px', kpiPad:'14px', titleSpacing:'0.22em', cardShadow:'0 1px 4px rgba(48,16,48,0.06)', backdrop:'none' },
    'cinematic':  { padCard:'24px', padSection:'18px 32px', heroValue:'68px', heroPad:'34px 22px', kpiValue:'34px', kpiPad:'22px', titleSpacing:'0.28em', cardShadow:'0 14px 40px rgba(48,16,48,0.18), 0 2px 6px rgba(48,16,48,0.08)', backdrop:'radial-gradient(ellipse at top, rgba(216,24,64,0.08), transparent 60%)' }
  };
  const m = moods[mood] || moods.boardroom;
  root.style.setProperty('--tw-card-pad', m.padCard);
  root.style.setProperty('--tw-section-pad', m.padSection);
  root.style.setProperty('--tw-hero-value', m.heroValue);
  root.style.setProperty('--tw-hero-pad', m.heroPad);
  root.style.setProperty('--tw-kpi-value', m.kpiValue);
  root.style.setProperty('--tw-kpi-pad', m.kpiPad);
  root.style.setProperty('--tw-title-spacing', m.titleSpacing);
  root.style.setProperty('--tw-card-shadow', m.cardShadow);
  root.style.setProperty('--tw-backdrop', m.backdrop);

  // Chroma Energy 0..100 — saturation + accent vibrancy
  const t = Math.max(0, Math.min(100, chromaEnergy)) / 100;
  // 0 = muted (gris-borgoña apagado), 100 = saturado VSPT
  const sat = (50 + t*60).toFixed(0); // 50% → 110%
  const accentAlpha = (0.04 + t*0.18).toFixed(3);
  const headerOpacity = (0.55 + t*0.40).toFixed(2);
  root.style.setProperty('--tw-chart-saturation', sat + '%');
  root.style.setProperty('--tw-accent-alpha', accentAlpha);
  root.style.setProperty('--tw-header-img-opacity', headerOpacity);
  // crimson principal: del wine apagado al crimson saturado
  const accentL = (32 + t*8).toFixed(0); // L: 32→40
  const accentC = (0.05 + t*0.20).toFixed(3); // chroma
  root.style.setProperty('--tw-accent', `oklch(${accentL}% ${accentC} 12)`);

  // Geometry — radii, borders, type
  const geos = {
    'soft':         { radCard:'18px', radInput:'12px', radPill:'24px', borderW:'1px', borderStyle:'solid', topBar:'3px', kpiTop:'4px', titleWeight:'600' },
    'architectural':{ radCard:'10px', radInput:'7px',  radPill:'8px',  borderW:'1px', borderStyle:'solid', topBar:'2px', kpiTop:'2px', titleWeight:'700' },
    'editorial':    { radCard:'2px',  radInput:'2px',  radPill:'2px',  borderW:'0',   borderStyle:'solid', topBar:'1px', kpiTop:'1px', titleWeight:'700' }
  };
  const g = geos[geometry] || geos.architectural;
  root.style.setProperty('--tw-rad-card', g.radCard);
  root.style.setProperty('--tw-rad-input', g.radInput);
  root.style.setProperty('--tw-rad-pill', g.radPill);
  root.style.setProperty('--tw-border-w', g.borderW);
  root.style.setProperty('--tw-top-bar', g.topBar);
  root.style.setProperty('--tw-kpi-top', g.kpiTop);
  root.style.setProperty('--tw-title-weight', g.titleWeight);

  // Re-render charts (saturation filter applies live, but data-label colors come from JS)
  if (typeof render === 'function' && rawData?.length) render();
}

function setTweak(key, val) {
  tweaksState[key] = val;
  applyTweaks();
  try { window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{ [key]:val } }, '*'); } catch(e){}
  // refresh panel UI
  renderTweaksPanel();
}

function renderTweaksPanel() {
  const panel = document.getElementById('tweaks-panel');
  if (!panel) return;
  panel.innerHTML = `
    <div class="tw-head">
      <div>
        <div class="tw-eyebrow">Tweaks</div>
        <div class="tw-title">Carácter del Tablero</div>
      </div>
      <button class="tw-close" onclick="dismissTweaks()" aria-label="Cerrar">&times;</button>
    </div>

    <div class="tw-section">
      <div class="tw-label">Mood</div>
      <div class="tw-hint">Densidad, contraste y peso del tablero</div>
      <div class="tw-radio">
        ${['boardroom','ops-floor','cinematic'].map(m => `
          <button class="tw-chip ${tweaksState.mood===m?'on':''}" onclick="setTweak('mood','${m}')">
            <div class="tw-chip-name">${m === 'boardroom' ? 'Sala de directorio' : m === 'ops-floor' ? 'Piso de planta' : 'Cinemático'}</div>
            <div class="tw-chip-sub">${m === 'boardroom' ? 'Equilibrado · neutro' : m === 'ops-floor' ? 'Compacto · KPIs grandes' : 'Aireado · sombras'}</div>
          </button>
        `).join('')}
      </div>
    </div>

    <div class="tw-section">
      <div class="tw-label">Energía cromática <span class="tw-val">${tweaksState.chromaEnergy}</span></div>
      <div class="tw-hint">Apagado · sobrio  →  saturado · enérgico</div>

function normalizeClasif(s) {
  if (!s) return '';
  const t = String(s).trim().toLowerCase();
  if (t.startsWith('tiempo de producc'))   return CATS.PRODUCCION;
  if (t.startsWith('tiempos de no uso'))   return CATS.NO_USO;
  if (t === 'nona')                        return CATS.NONA;
  if (t.startsWith('tiempos de cambio'))   return CATS.CAMBIO;
  if (t.startsWith('tiempos planeados'))   return CATS.PLANEADO;
  if (t.startsWith('paradas externas'))    return CATS.EXTERNA;
  if (t.startsWith('fallas de equipos'))   return CATS.FALLA;
  return String(s).trim();
}

function normalizeMes(v) {
  if (!v) return '';
  const s = String(v).toUpperCase().trim();
  const m = s.match(/(ENERO|FEBRERO|MARZO|ABRIL|MAYO|JUNIO|JULIO|AGOSTO|SEPTIEMBRE|OCTUBRE|NOVIEMBRE|DICIEMBRE)/);
  return m ? m[1] : s;
}

function toDate(v) { if (!v) return null; const d = new Date(v); return isNaN(d)?null:d; }

// Robusta: busca cuál de las columnas contiene la categoría AGRUPADORA
function getClasif1(r) {
  const candidates = [
    r['Clasificación_1'], r['Clasificacion_1'], r['clasificacion_1'],
    r['Clasificación'],   r['Clasificacion'],   r['clasificacion']
  ];
  for (const c of candidates) {
    const n = normalizeClasif(c);
    if (Object.values(CATS).includes(n)) return n;
  }
  for (const c of candidates) if (c) return normalizeClasif(c);
  return '';
}

function getClasif2(r) {
  const values = [
    r['Clasificación_2'], r['Clasificacion_2'], r['clasificacion_2'],
    r['Clasificación_1'], r['Clasificacion_1'], r['clasificacion_1'],
    r['Clasificación']
  ];
  for (const v of values) {
    if (!v) continue;
    const n = normalizeClasif(v);
    if (!Object.values(CATS).includes(n) && String(v).trim() !== '') return String(v).trim();
  }
  return '';
}

async function init() {
  document.documentElement.style.setProperty('--tab-color', THEME_COLOR[activeTab] || '#F9C13F');
  const st = localStorage.getItem(TARGETS_KEY);
  if (st) targets = JSON.parse(st);
  const sbState = localStorage.getItem('vspt_sidebar_collapsed');
  if (sbState === '1') { document.getElementById('sidebar').classList.add('collapsed'); document.querySelector('.main').classList.add('sb-collapsed'); document.getElementById('sidebarToggle').innerText = '›'; }

  // === FASE 1: KPI hoja (rápido) ===
  setFiltrosBloqueados(true);

  const kpiCached = localStorage.getItem(CACHE_KPI_KEY);
  if (kpiCached) {
    try {
      kpiData = JSON.parse(kpiCached);
      showContent();
      renderKPIsOnly();
      setStatus('amber', `CACHE KPI · CARGANDO DETALLE...`);
    } catch(e) {}
  }

  // El pedido de OPINONA (fase 2, lento) arranca YA, en paralelo con el KPI
  const opiPromise = fetch(API_URL + '?tabla=opinona');
  opiPromise.catch(() => {});   // el error real se maneja al hacer await más abajo

  try {
    const resK = await fetch(API_URL + '?tabla=kpi_planta_mensual');
    const jK = await resK.json();
    if (jK.status === 'success' && Array.isArray(jK.kpi_planta_mensual)) {
      kpiData = jK.kpi_planta_mensual;
      trySet(CACHE_KPI_KEY, JSON.stringify(kpiData));
      showContent();
      renderKPIsOnly();
      setStatus('amber', `KPI · CARGANDO DETALLE... (${kpiData.length} filas)`);
    }
  } catch (err) {
    console.warn('[KPI] error fetch:', err);
  }

  // === FASE 2: OPINONA cruda (lento, en background) ===
  const cached = localStorage.getItem(CACHE_KEY);
  if (cached) {
    try {
      rawData = JSON.parse(cached);
      opinonaCargada = true;
      showContent();
      setupFilters(); setFiltrosBloqueados(false); onFilterChange();
      setStatus('amber', `CACHE · ACTUALIZANDO... (${rawData.length} filas)`);
    } catch(e) {}
  }

  try {
    const res = await opiPromise;
    const j = await res.json();
    if (j.status === 'success' && Array.isArray(j.opinona)) {
      rawData = j.opinona;
      opinonaCargada = true;
      trySet(CACHE_KEY, JSON.stringify(rawData));
      showContent();
      setupFilters(); setFiltrosBloqueados(false); onFilterChange();
      const conTurno = rawData.filter(r => get(r,'turno_plan')).length;
      setStatus('green', `VINCULADO · ${rawData.length} REGISTROS · ${conTurno} con turno`);
    } else { throw new Error(j.msg || 'respuesta inválida'); }
  } catch (err) {
    console.error(err);
    if (rawData.length) { showContent(); setStatus('amber', 'CACHE · SIN CONEXIÓN'); }
    else if (kpiData.length) { showContent(); setStatus('amber', 'KPI · SIN DETALLE'); }
    else { setStatus('red','ERROR API'); showError(err.message); }
  }
}

const MS_IDS = ['f-turno','f-clasif','f-subclasif','f-tipoeti','f-formato'];
const MS_PLACEHOLDER = { 'f-turno':'Todos','f-clasif':'Todas','f-subclasif':'Todas','f-tipoeti':'Todos','f-formato':'Todos' };

function msSelected(id) {
  const sel = document.getElementById(id);
  if (!sel) return [];
  return Array.from(sel.selectedOptions).map(o => o.value).filter(v => v !== '');
}

function msPopulate(id, values) {
  const sel = document.getElementById(id);
  if (!sel) return;
  const prev = new Set(msSelected(id));
  sel.innerHTML = values.map(v => `<option value="${String(v).replace(/"/g,'&quot;')}"${prev.has(String(v))?' selected':''}>${v}</option>`).join('');
  msBuildPanel(id, values);
  msSyncUI(id);
}

function msBuildPanel(id, values) {
  const panel = document.getElementById(id + '-panel');
  if (!panel) return;
  const opts = values.map(v => {
    const esc = String(v).replace(/"/g,'&quot;');
    return `<label class="ms-opt"><input type="checkbox" value="${esc}" onchange="msToggleVal('${id}', this.value, this.checked)"><span title="${esc}">${v}</span></label>`;
  }).join('');
  panel.innerHTML =
    `<div class="ms-actions">
       <button type="button" class="ms-act" onclick="msSetAll('${id}', true)">Todos</button>
       <button type="button" class="ms-act" onclick="msSetAll('${id}', false)">Ninguno</button>
     </div>` + (opts || '<div style="padding:8px;color:var(--muted);font-size:11px;">Sin opciones</div>');
}

function msToggleVal(id, val, checked) {
  const sel = document.getElementById(id);
  if (!sel) return;
  for (const o of sel.options) { if (o.value === val) o.selected = checked; }
  msSyncUI(id);
  onFilterChange();
}

function msSetAll(id, selectAll) {
  const sel = document.getElementById(id);
  if (!sel) return;
  for (const o of sel.options) o.selected = selectAll;
  msSyncUI(id);
  onFilterChange();
}

// Refresca botón + checkboxes desde el estado del <select> oculto (fuente de verdad)
function msSyncUI(id) {
  const sel = document.getElementById(id);
  const txt = document.getElementById(id + '-text');
  const panel = document.getElementById(id + '-panel');
  if (!sel || !txt) return;
  const selected = msSelected(id);
  if (!selected.length) {
    txt.textContent = MS_PLACEHOLDER[id] || 'Todos';
    txt.classList.add('placeholder');
  } else if (selected.length === 1) {
    txt.textContent = selected[0];
    txt.classList.remove('placeholder');
  } else if (selected.length === sel.options.length) {
    txt.textContent = 'Todos (' + selected.length + ')';
    txt.classList.remove('placeholder');
  } else {
    txt.textContent = selected.length + ' seleccionados';
    txt.classList.remove('placeholder');
  }
  if (panel) {
    const set = new Set(selected);
    panel.querySelectorAll('input[type=checkbox]').forEach(cb => { cb.checked = set.has(cb.value); });
  }
}

function msSyncAll() { MS_IDS.forEach(msSyncUI); }

function msOpen(id, ev) {

function setupFilters() {

  meses.sort((a,b)=> MESES_ORDEN.indexOf(a) - MESES_ORDEN.indexOf(b));
  document.getElementById('f-periodo').innerHTML = '<option value="ALL">Vista Anual (YTD)</option>' + meses.map(m=>`<option value="${m}">${m}</option>`).join('');

  const semanas = [...new Set(dataYear.map(r => get(r,'Semana','semana')).filter(v=>v!=null && v!==''))].sort((a,b)=>Number(a)-Number(b));
  document.getElementById('f-semana').innerHTML = '<option value="">Todas</option>' + semanas.map(s=>`<option value="${s}">Semana ${s}</option>`).join('');

  const turnos = [...new Set(dataYear.map(r => String(get(r,'Turno','Turno ','turno')||'').trim()).filter(Boolean))].sort();
  msPopulate('f-turno', turnos);

  const clasifs = [...new Set(dataYear.map(r => getClasif1(r)).filter(Boolean))].sort();
  msPopulate('f-clasif', clasifs);

  const subs = [...new Set(dataYear.map(r => getClasif2(r)).filter(Boolean))].sort();
  msPopulate('f-subclasif', subs);

  const tipos = [...new Set(dataYear.map(r => getTipoEti(r)).filter(Boolean))].sort();
  msPopulate('f-tipoeti', tipos);

}

function clearFilters() {
  ['f-periodo','f-semana','f-mto'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = (id==='f-periodo'?'ALL':'');
  });
  MS_IDS.forEach(id => { const el = document.getElementById(id); if (el) { for (const o of el.options) o.selected = false; } msSyncUI(id); });
  document.getElementById('f-desde').value = '';
  document.getElementById('f-hasta').value = '';
  document.getElementById('f-op').value = '';
  onFilterChange();
}

function applyFilters(baseData) {
  const fPer = document.getElementById('f-periodo').value;
  const fDes = document.getElementById('f-desde').value;
  const fHas = document.getElementById('f-hasta').value;
  const fSem = document.getElementById('f-semana').value;
  const fTur = msSelected('f-turno');
  const fCla = msSelected('f-clasif');
  const fSub = msSelected('f-subclasif');
  const fMto = document.getElementById('f-mto').value;
  const fTE  = msSelected('f-tipoeti');
  const fFor = msSelected('f-formato');
  const fOp  = document.getElementById('f-op').value.trim().toLowerCase();

  return baseData.filter(r => {
    // Filtro de año (siempre primero — separa 2025 de 2026)
    const a = getAnio(r);
    if (a !== null && a !== activeYear) return false;
    if (fPer !== 'ALL' && normalizeMes(get(r,'mes','Mes','MES')) !== fPer) return false;
    if (fDes || fHas) {
      const d = getFecha(r);
      if (!d) return false;
      if (fDes && d < new Date(fDes+'T00:00:00')) return false;
      if (fHas && d > new Date(fHas+'T23:59:59')) return false;
    }
    if (fSem && String(get(r,'Semana','semana')) !== String(fSem)) return false;
    if (fTur.length && !fTur.includes(String(get(r,'Turno','Turno ','turno')||'').trim())) return false;
    if (fCla.length && !fCla.includes(getClasif1(r))) return false;
    if (fSub.length && !fSub.includes(getClasif2(r))) return false;
    if (fMto && !getMTO(r).includes(fMto)) return false;
    if (fTE.length && !fTE.includes(getTipoEti(r))) return false;
    if (fFor.length && !fFor.includes(get(r,'Formato_1','Formato','FORMATO','formato'))) return false;
    if (fOp) {
      const op = String(get(r,'Id. Producción','Id. Produccion','id_produccion','OP','op')||'').toLowerCase();
      if (!op.includes(fOp)) return false;
    }
    return true;
  });
}

function onFilterChange() { msSyncAll(); filteredData = applyFilters(rawData); render(); }

// Suma filas de KPI_PLANTA_MENSUAL filtradas por tabId + año + (opcional) mes.
// Devuelve un objeto con la misma forma que procesarMetricas, solo campos de KPI cards.
function metricasDesdeKPI(kpiRows, tabId, anio, mesNombre) {
  const filtradas = kpiRows.filter(r => {
    if (Number(r.anio) !== Number(anio)) return false;
    if (tabId !== 'planta' && String(r.linea).toUpperCase() !== tabId.toUpperCase()) return false;
    if (mesNombre && mesNombre !== 'ALL') {
      const nm = MESES_ORDEN_NUM[Number(r.mes)];
      if (nm !== mesNombre) return false;
    }
    return true;
  });

  const acc = {
    tot:0, t_no_uso:0, t_nona:0, t_cambio:0, t_planeado:0, t_externa:0, t_falla:0, t_produccion:0,
    perdidas_vel:0, cajas:0, semielaborado:0, n_lotes:0, pni:0, c9l:0,
    fallas_mto:0, fallas_op:0, fallas_inv:0
  };
  filtradas.forEach(r => {
    Object.keys(acc).forEach(k => { acc[k] += Number(r[k]) || 0; });
  });

  const tConPersonal = acc.tot - acc.t_no_uso;
  const tEfectivo    = tConPersonal - acc.t_nona;
  const tProdDisp    = tEfectivo - acc.t_cambio - acc.t_planeado;
  const tActualProd  = tProdDisp - acc.t_externa;
  const tOperacion   = tActualProd - acc.t_falla;
  const tTeorico     = tOperacion - acc.perdidas_vel;
  const opi = tEfectivo > 0 ? (tTeorico / tEfectivo) * 100 : 0;
  const lotePromedio = acc.n_lotes ? acc.cajas / acc.n_lotes : 0;
  // PNI convertido a cajas de 9L con la relación C9L/cajas agregada (fallback cuando se lee del KPI ya sumado).
  const pniC9L = acc.cajas > 0 ? acc.pni * (acc.c9l / acc.cajas) : acc.pni;
  const pctPNI = acc.c9l > 0 ? (pniC9L / acc.c9l) * 100 : 0;
  const hlTotal = acc.c9l * (window.HL_FACTOR ?? 0.09);

  return {
    opi, tConPersonal, tEfectivo, tProdDisp, tActualProd, tOperacion, tTeorico,
    perdidasVel: acc.perdidas_vel,
    tiempoPorClasif: {
      [CATS.NO_USO]: acc.t_no_uso, [CATS.NONA]: acc.t_nona, [CATS.CAMBIO]: acc.t_cambio,
      [CATS.PLANEADO]: acc.t_planeado, [CATS.EXTERNA]: acc.t_externa, [CATS.FALLA]: acc.t_falla,
      [CATS.PRODUCCION]: acc.t_produccion
    },
    cajas: acc.cajas, semielaborado: acc.semielaborado, pni: pniC9L, pctPNI, lotePromedio,
    c9lTotal: acc.c9l, hlTotal,
    fallasOrg: { MTO: acc.fallas_mto, OP: acc.fallas_op, INV: acc.fallas_inv }
  };
}

function procesarMetricas(data) {
  const tPor = { [CATS.NO_USO]:0, [CATS.NONA]:0, [CATS.CAMBIO]:0, [CATS.PLANEADO]:0, [CATS.EXTERNA]:0, [CATS.FALLA]:0, [CATS.PRODUCCION]:0 };
  let tot = 0, perdidasVel = 0;
  let cajas = 0, semielaborado = 0, pni = 0, c9lTotal = 0;
  const paros = {};
  const fallasOrg = { MTO:0, OP:0, INV:0 };
  const fallasEqMTO = {};
  const fallasEqOP  = {};
  const paradasExtEq = {};
  const lineas = { L1:0, L2:0, L3:0 };
  const cajasList = [];
  const hlPorFecha = {};
  const hlPorFechaTurno = {}; // { fecha: { MAÑANA, TARDE, NOCHE, 'S/D' } }
  const hlPorFechaTipo = {};  // { fecha: { LLENADO, VESTIDO, ... } }
  const hlPorTipo = {};
  const fallasPorSemana = {}; // { semana: horas }
  const lotesPorSemana = {}; // { semana: { suma, count } }
  const botellasUnid = {}; // { codigo_botella: N° unidades producidas }

  data.forEach(r => {
    const v = getVarTiempo(r);
    const pv = getPerdidas(r);
    const cls = getClasif1(r);
    const linea = getLinea(r);
    const te = getTipoEti(r);
    const isSemielab = te === 'LLENADO'; // solo "LLENADO" puro (no "LLENADO+VESTIDO")
    const cajasFila = getCajas(r);
    const c9l = getC9L(r);

    // Botellas producidas por código (en N° de unidades). Se excluyen filas sin
    // código real ('', '-', '0') para no ensuciar el Pareto.
    const codBot = getCodBotella(r);
    const uBot = getUnidades(r);
    if (uBot > 0 && codBot && codBot !== '-' && codBot !== '0') {
      botellasUnid[codBot] = (botellasUnid[codBot] || 0) + uBot;
    }

    tot += v;
    if (tPor[cls] !== undefined) tPor[cls] += v;
    perdidasVel += pv;

    if (cajasFila > 0) {
      if (isSemielab) semielaborado += cajasFila;
      else {
        cajas += cajasFila;
        cajasList.push(cajasFila);
        const sem = Number(get(r,'Semana','semana'));
        if (sem >= 1 && sem <= 53) {
          if (!lotesPorSemana[sem]) lotesPorSemana[sem] = { suma:0, count:0 };
          lotesPorSemana[sem].suma += cajasFila;
          lotesPorSemana[sem].count++;
        }
      }
    }

    // PNI convertido fila a fila a cajas de 9L (escala por la relación C9L/cajas de ese renglón).
    const pniFila = getPNI(r);
    if (pniFila > 0) {
      pni += cajasFila > 0 ? pniFila * (c9l / cajasFila) : pniFila;
    }

    if (c9l > 0) {
      c9lTotal += c9l;
      // Desglose por tipo etiquetado para HL (Vestido / Llenado / Llenado+Vestido / otros)
      let tipoHL = 'OTROS';
      if (te === 'LLENADO') tipoHL = 'LLENADO';
      else if (te === 'VESTIDO') tipoHL = 'VESTIDO';
      else if (te.includes('LLENADO') && te.includes('VESTIDO')) tipoHL = 'LLENADO+VESTIDO';
      else if (te) tipoHL = te;

      const hl = c9l * (window.HL_FACTOR ?? 0.09);
      const f = getFecha(r);
      if (f) {
        const key = f.toISOString().slice(0,10);
        hlPorFecha[key] = (hlPorFecha[key]||0) + hl;
        const t = getTurnoFromPlan(r);
        if (!hlPorFechaTurno[key]) hlPorFechaTurno[key] = {};
        hlPorFechaTurno[key][t] = (hlPorFechaTurno[key][t]||0) + hl;
        if (!hlPorFechaTipo[key]) hlPorFechaTipo[key] = {};
        hlPorFechaTipo[key][tipoHL] = (hlPorFechaTipo[key][tipoHL]||0) + hl;
      }
      hlPorTipo[tipoHL] = (hlPorTipo[tipoHL]||0) + hl;
    }

    if (cls === CATS.FALLA) {
      const sem = Number(get(r,'Semana','semana'));
      if (sem >= 1 && sem <= 53) fallasPorSemana[sem] = (fallasPorSemana[sem]||0) + v;
    }

    if (lineas[linea] !== undefined && cls !== CATS.NO_USO) lineas[linea] += v;

    if (cls && cls !== CATS.NO_USO) {
      paros[cls] = (paros[cls]||0) + v;
    }

    if (cls === CATS.FALLA) {
      const eq = getClasif2(r) || 'Sin clasificar';
      const mto = getMTO(r);
      if (mto.includes('MTO')) { fallasOrg.MTO += v; fallasEqMTO[eq] = (fallasEqMTO[eq]||0) + v; }
      else if (mto.includes('INV')) { fallasOrg.INV += v; }
      else { fallasOrg.OP += v; fallasEqOP[eq] = (fallasEqOP[eq]||0) + v; }
    }
    if (cls === CATS.EXTERNA) {
      const eq = getClasif2(r) || 'Sin clasificar';
      paradasExtEq[eq] = (paradasExtEq[eq]||0) + v;
    }
  });

  const tConPersonal = tot - tPor[CATS.NO_USO];
  const tEfectivo    = tConPersonal - tPor[CATS.NONA];
  const tProdDisp    = tEfectivo - tPor[CATS.CAMBIO] - tPor[CATS.PLANEADO];
  const tActualProd  = tProdDisp - tPor[CATS.EXTERNA];
  const tOperacion   = tActualProd - tPor[CATS.FALLA];
  const tTeorico     = tOperacion - perdidasVel;
  const opi = tEfectivo > 0 ? (tTeorico / tEfectivo) * 100 : 0;

  const lotePromedio = cajasList.length ? cajas / cajasList.length : 0;
  const pctPNI = c9lTotal > 0 ? (pni / c9lTotal) * 100 : 0;
  const hlTotal = c9lTotal * (window.HL_FACTOR ?? 0.09);

  return {
    tot, tConPersonal, tEfectivo, tProdDisp, tActualProd, tOperacion, tTeorico, perdidasVel,
    tiempoPorClasif: tPor, opi,
    cajas, semielaborado, pni, pctPNI, lotePromedio, cajasList, lotesPorSemana, botellasUnid,
    c9lTotal, hlTotal, hlPorFecha, hlPorFechaTurno, hlPorFechaTipo, hlPorTipo, fallasPorSemana,
    paros, fallasOrg, fallasEqMTO, fallasEqOP, paradasExtEq, lineas
  };
}

function changeTab(id) {
  activeTab = id;
  document.documentElement.style.setProperty('--tab-color', THEME_COLOR[id] || '#F9C13F');
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === id);
    if (b.dataset.tab === id) b.style.setProperty('--tab-color', THEME_COLOR[id] || 'var(--vspt-amber)');
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
  document.getElementById('tab-'+id).style.display = 'block';
  
  const EMBED = {
    calidad:   { iframeId:'iframeCalidad',   src:'Dashboard_calidad.html' },
    programas: { iframeId:'iframeProgramas', src:'Dashboard_programas.html' },
    personal:  { iframeId:'iframePersonal',  src:'Dashboard_personal.html' }
  };
  if (EMBED[id]) {
  const iframeId = EMBED[id].iframeId;
  const src = EMBED[id].src;
  const iframe = document.getElementById(iframeId);
  if (iframe && iframe.src === 'about:blank') {
    iframe.addEventListener('load', () => {
      try { iframe.contentWindow.postMessage({ type:'vspt-theme', dark: isDark }, '*'); } catch(e){}
    }, { once:true });
    iframe.src = src;
  } else {
    try { iframe.contentWindow.postMessage({ type:'vspt-theme', dark: isDark }, '*'); } catch(e){}
  }
  document.getElementById('sidebar').style.display = 'none';
  document.getElementById('sidebarToggle').style.display = 'none';
} else {
  document.getElementById('sidebar').style.display = '';
  document.getElementById('sidebarToggle').style.display = '';
}
  render();
}

function render() {
  if (activeTab === 'calidad' || activeTab === 'programas' || activeTab === 'personal') return;
  if (!rawData.length) return;
  if (activeTab === 'planta')    renderTab('planta', filteredData);
  else if (activeTab === 'l1')   renderTab('l1', filteredData.filter(r => getLinea(r) === 'L1'));
  else if (activeTab === 'l2')   renderTab('l2', filteredData.filter(r => getLinea(r) === 'L2'));
  else if (activeTab === 'l3')   renderTab('l3', filteredData.filter(r => getLinea(r) === 'L3'));
  else if (activeTab === 'objetivos') renderObjetivos();
}

function drawEvolutivoDesdeKPI(id, tabId, target, themeColor) {
  const lineByYear = { 2025: new Array(12).fill(null), 2026: new Array(12).fill(null) };
  const ytdByYear  = { 2025: null, 2026: null };

  [2025, 2026].forEach(yr => {
    for (let mes = 1; mes <= 12; mes++) {
      const m = metricasDesdeKPI(kpiData, tabId, yr, MESES_ORDEN_NUM[mes]);
      if (m.tEfectivo > 0) {
        const v = Number(m.opi.toFixed(1));
        lineByYear[yr][mes-1] = v > 0 ? v : null;
      }
    }
    const mY = metricasDesdeKPI(kpiData, tabId, yr, 'ALL');
    if (mY.tEfectivo > 0) {
      const v = Number(mY.opi.toFixed(1));
      ytdByYear[yr] = v > 0 ? v : null;
    }
  });

  if (lineByYear[2025].every(v => v === null)) {
    const h25 = history2025[tabId];
    if (h25) {
      lineByYear[2025] = [...h25.meses];
      ytdByYear[2025]  = h25.ytd;
    }
  }

  const line2025 = [...lineByYear[2025], null];
  const line2026 = [...lineByYear[2026], null];
  const bar2025  = [...new Array(12).fill(null), ytdByYear[2025]];
  const bar2026  = [...new Array(12).fill(null), ytdByYear[2026]];
  const barMeta  = new Array(13).fill(null);
  barMeta[12] = target;

  drawChart(id, {
    series: [
      { name:'2025',   type:'line',   data: line2025 },
      { name:'2026',   type:'line',   data: line2026 },
      { name:'YTD 25', type:'column', data: bar2025 },
      { name:'YTD 26', type:'column', data: bar2026 },
      { name:'Meta',   type:'column', data: barMeta }
    ],
    chart: { type:'line', height:320, toolbar:{show:false}, fontFamily:'Montserrat', foreColor:getTextColor() },
    colors: ['#a89aa8', themeColor, '#a89aa8', themeColor, '#98A040'],
    stroke: { width:[2,3,0,0,0], curve:'smooth' },
    markers: { size:[4,5,0,0,0] },
    plotOptions: { bar:{ columnWidth:'55%', borderRadius:3, dataLabels:{ position:'top' } } },
    xaxis: { categories:[...MESES_ABR,'YTD'], labels:{style:{fontSize:'11px',colors:getTextColor()}} },
    yaxis: { labels:{formatter: v => v ? v.toFixed(0)+'%' : '', style:{colors:getTextColor()}} },
    grid: { borderColor:getGridColor(), strokeDashArray:4, padding:{left:10,right:20,top:10} },
    annotations: { yaxis:[{ y:target, borderColor:themeColor, strokeDashArray:6, borderWidth:2, label:{ position:'left', offsetX:80, offsetY:-2, text:'Meta '+target+'%', style:{color:'#fff',background:themeColor,fontSize:'10px',fontWeight:700} } }] },
    dataLabels: { enabled:true, formatter: v => v ? v.toFixed(1)+'%' : '', style:{fontSize:'10px',fontWeight:700}, background:{enabled:true, borderRadius:3, padding:3, borderWidth:1} },
    legend: { position:'top', horizontalAlign:'right', fontSize:'11px', labels:{colors:getTextColor()} },
    tooltip: { theme: isDark?'dark':'light', y:{ formatter: v => v!=null ? v+'%' : '—' } }
  });
}

  const ids = ['f-desde','f-hasta','f-semana','f-turno','f-clasif','f-subclasif','f-mto','f-tipoeti','f-formato','f-op'];

  });

  }

  drawDonut(`chart-${tabId}-donut`, m.paros);

  const paradasArr = Object.entries(m.paradasExtEq).filter(([,v])=>v>0).map(([k,v])=>({x:k, y:Number(v.toFixed(2))}));
  if (paradasArr.length) {
    drawChart(`chart-${tabId}-paradas`, {
      series: [{ data: paradasArr }],
      chart: { type:'treemap', height:300, toolbar:{show:false}, fontFamily:'Montserrat',
        events: { dataPointSelection: (e,c,cfg) => openModal(isPlanta?null:lineId, cfg.w.config.series[cfg.seriesIndex].data[cfg.dataPointIndex].x, CATS.EXTERNA) }
      },
      colors: [themeColor],
      plotOptions:{ treemap:{ enableShades:true, shadeIntensity:0.5 } },
      dataLabels:{ enabled:true, style:{fontSize:'11px', fontWeight:700} },
      tooltip: { y:{ formatter: v => v.toFixed(2)+' h' } }
    });
  } else {
    const el = document.getElementById(`chart-${tabId}-paradas`); if (el) el.innerHTML = `<div class="no-data">Sin paradas externas</div>`;
  }

  fallaParetoCache[tabId] = { fallasEqMTO: m.fallasEqMTO, fallasEqOP: m.fallasEqOP, isPlanta, lineId };
  if (!fallaFilterState[tabId]) fallaFilterState[tabId] = { MTO:true, OP:true };
  drawFallaPareto(tabId);

  drawHistograma(`chart-${tabId}-hist`, m.cajasList, themeColor);

  // Colapsables: dibujar solo si están visibles (o se dibujan al abrir)
  pendingCharts[`chart-${tabId}-fallasem`] = () => drawFallaSemana(`chart-${tabId}-fallasem`, m.fallasPorSemana, '#D81840');
  pendingCharts[`chart-${tabId}-lotesem`]  = () => drawLoteSemana(`chart-${tabId}-lotesem`, m.lotesPorSemana, themeColor);
  pendingCharts[`chart-${tabId}-botellas`] = () => drawBotellasPareto(`chart-${tabId}-botellas`, m.botellasUnid, themeColor);

  if (document.getElementById(`collapse-${tabId}-fallasem`)?.style.display === 'block') pendingCharts[`chart-${tabId}-fallasem`]();
  if (document.getElementById(`collapse-${tabId}-lotesem`)?.style.display === 'block')  pendingCharts[`chart-${tabId}-lotesem`]();
  if (document.getElementById(`collapse-${tabId}-botellas`)?.style.display === 'block') pendingCharts[`chart-${tabId}-botellas`]();
}

function getTextColor() { return isDark ? '#c9b8c4' : '#7a627a'; }
function getGridColor() { return isDark ? 'rgba(255,255,255,0.06)' : 'rgba(78,23,66,0.08)'; }

function drawDonut(id, parosObj) {
  const el = document.querySelector('#'+id);
  // Ordenar: Producción primero, luego paros por magnitud
  const entries = Object.entries(parosObj).filter(([,v])=>v>0)
    .sort(([ka,va],[kb,vb]) => {
      if (ka === CATS.PRODUCCION) return -1;
      if (kb === CATS.PRODUCCION) return 1;
      return vb - va;
    });
  if (!entries.length) { if (el) el.innerHTML = '<div class="no-data">Sin datos en el período</div>'; return; }

  const total = entries.reduce((a,[,v])=>a+v, 0);
  const prodHrs = parosObj[CATS.PRODUCCION] || 0;
  const pctProd = total > 0 ? (prodHrs/total)*100 : 0;
  const colors = entries.map(([k]) => CAT_COLORS[k] || '#B61858');

  drawChart(id, {
    series: entries.map(([,v]) => Number(v.toFixed(2))),
    labels: entries.map(([k]) => k),
    chart: { type:'donut', height:340, foreColor:getTextColor(), fontFamily:'Montserrat',
      events: { dataPointSelection: (e, c, cfg) => {
        const label = cfg.w.config.labels[cfg.dataPointIndex];
        const tabId = id.split('-')[1];
        const lineId = tabId === 'planta' ? null : tabId.toUpperCase();
        openModalClasif(lineId, label);
      }}
    },
    colors,
    stroke: { width:2, colors:[isDark?'#2a1626':'#FFFFFF'] },
    legend: { position:'bottom', fontSize:'11px', fontWeight:600, itemMargin:{horizontal:6,vertical:3}, labels:{colors:getTextColor()}, markers:{width:10,height:10,radius:3} },
    dataLabels: {
      enabled:true,
      formatter: (v) => v >= 4 ? v.toFixed(1)+'%' : '',
      style:{ fontSize:'11px', fontWeight:700, fontFamily:'Montserrat', colors:['#fff'] },
      dropShadow:{ enabled:true, blur:2, opacity:0.45 }
    },
    tooltip: {
      theme: isDark?'dark':'light',
      y:{ formatter: v => v.toFixed(2) + ' h  ('+(total>0?(v/total*100).toFixed(1):'0')+'%)' }
    },
    plotOptions: { pie:{
      expandOnClick:true,
      donut:{
        size:'68%',
        labels:{
          show:true,
          name: { fontSize:'11px', fontWeight:600, color:getTextColor(), offsetY:-6 },
          value: { color: getTextColor(), fontSize:'22px', fontWeight:700, fontFamily:'Montserrat', offsetY:4, formatter: v => parseFloat(v).toFixed(1) + ' h' },
          total: { show:true, label:'Producción', color:'#98A040',
            fontSize:'11px', fontWeight:700,
            formatter: () => pctProd.toFixed(1) + '%  ·  ' + prodHrs.toFixed(1) + ' h' }
        }
      }
    } },
    responsive: [{ breakpoint:480, options:{ legend:{position:'bottom'} } }]
  });
}

function setOpiView(tabId, view) {
  opiViewState[tabId] = view;
  // Actualizar estado visual de botones sin re-renderizar todo el tab
  const sw = document.querySelector(`.opi-view-switch[data-tab="${tabId}"]`);
  if (sw) sw.querySelectorAll('.opi-view-btn').forEach(b => b.classList.toggle('on', b.dataset.view === view));
  const target = targets[tabId]?.anual ?? 40;
  const themeColor = THEME_COLOR[tabId];
  drawEvolutivo(`chart-${tabId}-evo`, tabId, target, themeColor);
}

// Aplica los filtros del usuario (período, fecha, semana, turno, etc.) a un año específico.
// Útil para chart de OPINONA que compara dos años respetando los demás filtros.
function applyFiltersForYear(year) {
  const saved = activeYear;
  activeYear = year;
  const d = applyFilters(rawData);
  activeYear = saved;
  return d;
}

function drawEvolutivo(id, tabId, target, themeColor) {
  const view = opiViewState[tabId] || 'M';
  const isLinea = tabId !== 'planta';
  const lineaKey = tabId.toUpperCase();
  const filterByLinea = r => !isLinea || getLinea(r) === lineaKey;

  // ============================
  // Vista DIARIA o SEMANAL (un solo año, respeta filtros del usuario)
  // ============================
  if (view === 'D' || view === 'W') {
    const data = filteredData.filter(filterByLinea);

    if (!data.length) {
      const el = document.querySelector('#'+id);
      if (el) el.innerHTML = '<div class="no-data">Sin datos para los filtros seleccionados</div>';
      return;
    }

    const buckets = {};
    const sortKeys = [];

    if (view === 'D') {
      data.forEach(r => {
        const d = getFecha(r);
        if (!d) return;
        const key = d.toISOString().slice(0,10);
        if (!buckets[key]) { buckets[key] = []; sortKeys.push(key); }
        buckets[key].push(r);
      });
    } else {
      data.forEach(r => {
        const w = Number(get(r,'Semana','semana'));
        if (!(w >= 1 && w <= 53)) return;
        const key = String(w);
        if (!buckets[key]) { buckets[key] = []; sortKeys.push(key); }
        buckets[key].push(r);
      });
    }

    const keys = view === 'D'
      ? [...new Set(sortKeys)].sort()
      : [...new Set(sortKeys)].sort((a,b) => Number(a) - Number(b));

    const points = keys.map(k => {
      const m = procesarMetricas(buckets[k]);
      return Number(m.opi.toFixed(1));
    });

    const seriesData = view === 'D'
      ? keys.map((k,i) => ({ x: new Date(k).getTime(), y: points[i] }))
      : points;

    drawChart(id, {
      series: [{ name: view==='D' ? 'OPI Diario' : 'OPI Semanal', type:'line', data: seriesData }],
      chart: { type:'line', height:320, toolbar:{show:false}, fontFamily:'Montserrat', foreColor:getTextColor() },
      colors: [themeColor],
      stroke: { width:3, curve:'smooth' },
      markers: { size:4 },
      xaxis: view === 'D'
        ? { type:'datetime', labels:{ style:{fontSize:'11px',colors:getTextColor()}, datetimeFormatter:{year:'yyyy', month:"MMM 'yy", day:'dd MMM'} } }
        : { categories: keys.map(w => 'S'+w), labels:{ style:{fontSize:'11px',colors:getTextColor()} }, title:{ text:'Semana', style:{fontSize:'10px',color:getTextColor()} } },
      yaxis: { labels:{formatter: v => v ? v.toFixed(0)+'%' : '', style:{colors:getTextColor()}} },
      grid: { borderColor:getGridColor(), strokeDashArray:4, padding:{left:10,right:20,top:10} },
      annotations: { yaxis:[{ y:target, borderColor:themeColor, strokeDashArray:6, borderWidth:2, label:{ position:'left', offsetX:80, offsetY:-2, text:'Meta '+target+'%', style:{color:'#fff',background:themeColor,fontSize:'10px',fontWeight:700} } }] },
      dataLabels: { enabled:true, formatter: v => v ? v.toFixed(1)+'%' : '', style:{fontSize:'10px',fontWeight:700}, background:{enabled:true, borderRadius:3, padding:3, borderWidth:1} },
      legend: { show:false },
      tooltip: {
        theme: isDark?'dark':'light',
        x: view === 'D' ? { format:'dd MMM yyyy' } : { formatter: (val, opts) => 'Semana '+keys[opts.dataPointIndex] },
        y: { formatter: v => v!=null ? v+'%' : '—' }
      }
    });
    return;
  }

  // ============================
  // Vista MENSUAL (default): comparativa 2025 vs 2026 + YTD, respetando filtros NO-año
  // ============================
  const lineByYear = { 2025: new Array(12).fill(null), 2026: new Array(12).fill(null) };
  const ytdByYear  = { 2025: null, 2026: null };

  [2025, 2026].forEach(yr => {
    const dataYr = applyFiltersForYear(yr).filter(filterByLinea);
    MESES_ORDEN.forEach((mes, idx) => {
      const rows = dataYr.filter(r => normalizeMes(get(r,'mes','Mes','MES')) === mes);
      if (rows.length) {
        const mm = procesarMetricas(rows);
        const v = Number(mm.opi.toFixed(1));
        lineByYear[yr][idx] = v > 0 ? v : null;
      }
    });
    if (dataYr.length) {
      const mY = procesarMetricas(dataYr);
      const v = Number(mY.opi.toFixed(1));
      ytdByYear[yr] = v > 0 ? v : null;
    }
  });

  // Fallback histórico hardcoded para 2025 si no hay datos en rawData
  // (solo cuando no se aplicaron filtros que dejarían 2025 intencionalmente vacío)
  if (lineByYear[2025].every(v => v === null)) {
    const h25 = history2025[tabId];
    if (h25) {
      lineByYear[2025] = [...h25.meses];
      ytdByYear[2025]  = h25.ytd;
    }
  }

  const line2025 = [...lineByYear[2025], null];
  const line2026 = [...lineByYear[2026], null];
  const bar2025  = [...new Array(12).fill(null), ytdByYear[2025]];
  const bar2026  = [...new Array(12).fill(null), ytdByYear[2026]];
  const barMeta  = new Array(13).fill(null);
  barMeta[12] = target;

  drawChart(id, {
    series: [
      { name:'2025',   type:'line',   data: line2025 },
      { name:'2026',   type:'line',   data: line2026 },
      { name:'YTD 25', type:'column', data: bar2025 },
      { name:'YTD 26', type:'column', data: bar2026 },
      { name:'Meta',   type:'column', data: barMeta }
    ],
    chart: { type:'line', height:320, toolbar:{show:false}, fontFamily:'Montserrat', foreColor:getTextColor() },
    colors: ['#a89aa8', themeColor, '#a89aa8', themeColor, '#98A040'],
    stroke: { width:[2,3,0,0,0], curve:'smooth' },
    markers: { size:[4,5,0,0,0] },
    plotOptions: { bar:{ columnWidth:'55%', borderRadius:3, dataLabels:{ position:'top' } } },
    xaxis: { categories:[...MESES_ABR,'YTD'], labels:{style:{fontSize:'11px',colors:getTextColor()}} },
    yaxis: { labels:{formatter: v => v ? v.toFixed(0)+'%' : '', style:{colors:getTextColor()}} },
    grid: { borderColor:getGridColor(), strokeDashArray:4, padding:{left:10,right:20,top:10} },
    annotations: { yaxis:[{ y:target, borderColor:themeColor, strokeDashArray:6, borderWidth:2, label:{ position:'left', offsetX:80, offsetY:-2, text:'Meta '+target+'%', style:{color:'#fff',background:themeColor,fontSize:'10px',fontWeight:700} } }] },
    dataLabels: { enabled:true, formatter: v => v ? v.toFixed(1)+'%' : '', style:{fontSize:'10px',fontWeight:700}, background:{enabled:true, borderRadius:3, padding:3, borderWidth:1} },
    legend: { position:'top', horizontalAlign:'right', fontSize:'11px', labels:{colors:getTextColor()} },
    tooltip: { theme: isDark?'dark':'light', y:{ formatter: v => v!=null ? v+'%' : '—' } }
  });
}

function drawHL(id, hlPorFechaTipo, color) {
  const el = document.querySelector('#'+id);
  const keys = Object.keys(hlPorFechaTipo).sort();
  if (!keys.length) { if (el) el.innerHTML = '<div class="no-data">Sin volumen envasado en el período</div>'; return; }

  // Recolectar todos los tipos presentes y ordenarlos por volumen total descendente
  const tipoTotales = {};
  keys.forEach(k => Object.entries(hlPorFechaTipo[k]).forEach(([t,v]) => { tipoTotales[t] = (tipoTotales[t]||0) + v; }));
  const tipos = Object.entries(tipoTotales).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).map(([t])=>t);

  // Paleta consistente VSPT — mismo color para mismo tipo siempre
  const tipoColorMap = {
    'VESTIDO': '#701F52',
    'LLENADO': '#F08808',
    'LLENADO+VESTIDO': '#F8C040',
    'LLENADO + VESTIDO': '#F8C040',
    'OTROS': '#a89aa8',
    '': '#a89aa8'
  };
  const fallback = ['#D81840','#98A040','#4E1742','#B61858','#E0D0B8'];
  let fbIdx = 0;
  const colorFor = t => tipoColorMap[t] || tipoColorMap[String(t).toUpperCase()] || fallback[fbIdx++ % fallback.length];

  const series = tipos.map(t => ({

  for (let i=0; i<nBins; i++) cats.push(`${i*BIN}-${(i+1)*BIN}`);

// Pareto de botellas producidas (N° de unidades), de mayor a menor, con línea
// de % acumulado y corte al 80% del volumen. Reacciona a los filtros porque se
// alimenta de las métricas ya filtradas (m.botellasUnid) en cada renderTab.
function drawBotellasPareto(id, botellasUnid, color) {
  const el = document.querySelector('#'+id);
  const sorted = Object.entries(botellasUnid || {}).filter(([,v]) => v > 0).sort((a,b) => b[1]-a[1]);
  if (!sorted.length) { if (el) el.innerHTML = '<div class="no-data">Sin producción de botellas en el período</div>'; return; }

  const MAX_BARS = 40;
  const shown = sorted.slice(0, MAX_BARS);
  const tot = sorted.reduce((a,[,v]) => a+v, 0);

  // Muestra el código con un máximo de 3 ceros a la izquierda (recorta la
  // "cola" de ceros de padding pero mantiene el resto del código intacto).
  const shortCod = k => k.replace(/^0+/, m => '0'.repeat(Math.min(3, m.length)));

  const cats = [], barData = [], cumData = [];
  let cum = 0, idx80 = -1;
  shown.forEach(([k,v], i) => {
    cum += v;
    cats.push(shortCod(k));
    barData.push(v);
    const cumPct = tot > 0 ? (cum/tot)*100 : 0;
    cumData.push(Number(cumPct.toFixed(1)));
    if (idx80 < 0 && cumPct >= 80) idx80 = i; // primer código que alcanza el 80%
  });
  if (idx80 < 0) idx80 = shown.length - 1;
  const nVitales = idx80 + 1;

  const fmt = v => v >= 1e6 ? (v/1e6).toFixed(2)+'M' : v >= 1e3 ? Math.round(v/1e3)+'k' : String(Math.round(v));

  // Banda que resalta los códigos "pocos vitales" (hasta el 80%)
  const xann = [{
    x: cats[0], x2: cats[idx80],
    fillColor: color, opacity: isDark ? 0.14 : 0.09, borderColor: 'transparent',
    label: {
      text: `${nVitales} código${nVitales>1?'s':''} = 80% del volumen`,
      position: 'top', orientation: 'horizontal', offsetY: -2,
      style: { color:'#fff', background: color, fontSize:'10px', fontWeight:700, padding:{left:6,right:6,top:3,bottom:3} }
    }
  }];
  const yann = [{
    y: 80, yAxisIndex: 1, borderColor: '#F08808', strokeDashArray: 6, borderWidth: 2,
    label: { position:'right', text:'80%', style:{ color:'#fff', background:'#F08808', fontSize:'10px', fontWeight:700 } }
  }];

  drawChart(id, {
    series: [
      { name:'N° Unidades', type:'column', data: barData },
      { name:'% Acumulado', type:'line',   data: cumData }
    ],
    chart: { type:'line', height:360, toolbar:{show:false}, foreColor:getTextColor(), fontFamily:'Montserrat', animations:{enabled:true} },
    stroke: { width:[0,3], curve:'straight' },
    markers: { size:[0,4], strokeWidth:0, hover:{size:6} },
    colors: [color, '#F08808'],
    plotOptions: { bar:{ borderRadius:4, columnWidth:'62%' } },
    dataLabels: {
      enabled:true, enabledOnSeries:[0],
      formatter:(v,o) => o.seriesIndex === 0 ? fmt(v) : '',
      offsetY:-18, style:{ fontSize:'9px', colors:[getTextColor()] }
    },
    xaxis: { categories: cats, labels:{ style:{fontSize:'9px'}, rotate:-45, rotateAlways:true, trim:false, hideOverlappingLabels:false, maxHeight:120 } },
    yaxis: [
      { seriesName:'N° Unidades',
        title:{ text:'N° de unidades', style:{fontSize:'11px', color:getTextColor(), fontWeight:600} },
        labels:{ style:{fontSize:'10px'}, formatter:v => fmt(v) } },
      { seriesName:'% Acumulado', opposite:true, min:0, max:100, tickAmount:5,
        title:{ text:'% acumulado', style:{fontSize:'11px', color:getTextColor(), fontWeight:600} },
        labels:{ style:{fontSize:'10px'}, formatter:v => Math.round(v)+'%' } }
    ],
    annotations: { xaxis: xann, yaxis: yann },
    tooltip: {
      shared:true, intersect:false,
      x: { formatter:v => 'Botella '+v },
      y: { formatter:(v,o) => o.seriesIndex === 1 ? v.toFixed(1)+'% acumulado' : Math.round(v).toLocaleString('es-AR')+' unidades' }
    },
    legend: { position:'top', horizontalAlign:'right', fontSize:'11px', fontWeight:600, markers:{width:10,height:10} },
    grid: { borderColor:getGridColor(), strokeDashArray:4 }
  });
}

function drawFallaSemana(id, fallasPorSemana, color) {
  const el = document.querySelector('#'+id);
  const semanas = Object.keys(fallasPorSemana).map(Number).sort((a,b)=>a-b);
  if (semanas.length < 2) { if (el) el.innerHTML = '<div class="no-data">Se necesitan al menos 2 semanas con datos</div>'; return; }

  const puntos = semanas.map(s => ({ x: s, y: fallasPorSemana[s] }));

  const n = puntos.length;
  let sx=0, sy=0, sxy=0, sxx=0;
  puntos.forEach(p => { sx+=p.x; sy+=p.y; sxy+=p.x*p.y; sxx+=p.x*p.x; });
  const denom = n*sxx - sx*sx;
  const slope = denom !== 0 ? (n*sxy - sx*sy) / denom : 0;
  const intercept = (sy - slope*sx) / n;
  const meanY = sy/n;
  let ssTot=0, ssRes=0;
  puntos.forEach(p => { const yHat = slope*p.x + intercept; ssTot += (p.y-meanY)**2; ssRes += (p.y-yHat)**2; });
  const r2 = ssTot>0 ? 1 - ssRes/ssTot : 0;

  const xMin = semanas[0], xMax = semanas[semanas.length-1];
  const tendencia = [
    { x: xMin, y: Math.max(0, slope*xMin + intercept) },
    { x: xMax, y: Math.max(0, slope*xMax + intercept) }
  ];
  // Tendencia al alza en fallas = MALO (rojo); a la baja = BUENO (oliva)
  const trendColor = slope <= 0 ? '#9AA423' : '#D81840';
  const trendLabel = `Tendencia (${slope>=0?'+':''}${slope.toFixed(2)} h/sem · R²=${r2.toFixed(2)})`;

  drawChart(id, {
    series: [
      { name:'Horas de falla', type:'column', data: puntos.map(p => ({ x:p.x, y:Number(p.y.toFixed(2)) })) },
      { name:trendLabel, type:'line', data: tendencia.map(p => ({ x:p.x, y:Number(p.y.toFixed(2)) })) }
    ],
    chart: { type:'line', height:300, toolbar:{show:false}, foreColor:getTextColor() },
    stroke: { width:[0,2], dashArray:[0,6] },
    colors: [color, trendColor],
    plotOptions: { bar:{ borderRadius:3, columnWidth:'55%' } },
    xaxis: {
      type:'numeric', min:1, max:52, tickAmount:13,
      title:{ text:'Número de Semana', style:{fontSize:'11px', color:getTextColor(), fontWeight:600} },
      labels:{ style:{fontSize:'10px'}, formatter:v=>'S'+Math.round(v) }
    },
    yaxis: {
      title:{ text:'Horas de falla', style:{fontSize:'11px', color:getTextColor(), fontWeight:600} },
      labels:{ formatter:v=>v.toFixed(1)+' h' }
    },
    tooltip: {
      shared:true, intersect:false,
      x: { formatter:v => 'Semana '+Math.round(v) },
      y: { formatter:v => v.toFixed(2)+' h' }
    },
    legend: { position:'top', horizontalAlign:'right', fontSize:'11px', fontWeight:600, markers:{width:10,height:10} },
    grid: { borderColor:getGridColor(), strokeDashArray:4 }
  });
}

function drawLoteSemana(id, lotesPorSemana, color) {
  const el = document.querySelector('#'+id);
  const semanas = Object.keys(lotesPorSemana).map(Number).sort((a,b)=>a-b);
  if (semanas.length < 2) { if (el) el.innerHTML = '<div class="no-data">Se necesitan al menos 2 semanas con datos</div>'; return; }

  // Promedio por semana
  const puntos = semanas.map(s => ({ x: s, y: lotesPorSemana[s].suma / lotesPorSemana[s].count }));

  // Regresión lineal: y = a·x + b
  const n = puntos.length;
  let sx=0, sy=0, sxy=0, sxx=0;
  puntos.forEach(p => { sx+=p.x; sy+=p.y; sxy+=p.x*p.y; sxx+=p.x*p.x; });
  const denom = n*sxx - sx*sx;
  const slope = denom !== 0 ? (n*sxy - sx*sy) / denom : 0;
  const intercept = (sy - slope*sx) / n;

  // r² para info
  const meanY = sy/n;
  let ssTot=0, ssRes=0;
  puntos.forEach(p => { const yHat = slope*p.x + intercept; ssTot += (p.y-meanY)**2; ssRes += (p.y-yHat)**2; });
  const r2 = ssTot>0 ? 1 - ssRes/ssTot : 0;

  const xMin = semanas[0], xMax = semanas[semanas.length-1];
  const tendencia = [
    { x: xMin, y: slope*xMin + intercept },
    { x: xMax, y: slope*xMax + intercept }
  ];

  const trendColor = slope >= 0 ? '#9AA423' : '#D81840';
  const trendLabel = `Tendencia (${slope>=0?'+':''}${slope.toFixed(1)} cajas/sem · R²=${r2.toFixed(2)})`;

  drawChart(id, {
    series: [
      { name:'Lote promedio', type:'line', data: puntos.map(p => ({ x:p.x, y:Math.round(p.y) })) },
      { name:trendLabel, type:'line', data: tendencia.map(p => ({ x:p.x, y:Math.round(p.y) })) }
    ],
    chart: { type:'line', height:300, toolbar:{show:false}, foreColor:getTextColor(), animations:{enabled:true} },
    stroke: { curve:['straight','straight'], width:[3,2], dashArray:[0,6] },
    markers: { size:[5,0], strokeWidth:0, hover:{size:7} },
    colors: [color, trendColor],
    xaxis: {
      type:'numeric', min:1, max:52, tickAmount:13,
      title:{ text:'Número de Semana', style:{fontSize:'11px', color:getTextColor(), fontWeight:600} },
      labels:{ style:{fontSize:'10px'}, formatter:v=>'S'+Math.round(v) }
    },
    yaxis: {
      title:{ text:'Cajas / lote', style:{fontSize:'11px', color:getTextColor(), fontWeight:600} },
      labels:{ style:{fontSize:'10px'}, formatter:v=>Math.round(v).toLocaleString('es-AR') }
    },
    tooltip: {
      shared:false, intersect:true,
      x: { formatter:v => 'Semana '+Math.round(v) },
      y: { formatter:v => Math.round(v).toLocaleString('es-AR')+' cajas' }
    },
    legend: { position:'top', horizontalAlign:'right', fontSize:'11px', fontWeight:600, markers:{width:10,height:10} },
    grid: { borderColor:getGridColor(), strokeDashArray:4 }
  });
}

function renderObjetivos() {
  const container = document.getElementById('tab-objetivos');
  const lineas = [
    { id:'planta', nombre:'🏭 Planta San Juan' },
    { id:'l1', nombre:'📦 Línea 1' },
    { id:'l2', nombre:'📦 Línea 2' },
    { id:'l3', nombre:'📦 Línea 3' }
  ];
  const fPer = document.getElementById('f-periodo').value;
  const labelPeriodo = fPer === 'ALL' ? 'YTD' : fPer;

  let html = `
    <div class="section-title" style="justify-content:space-between;">
      <span style="display:flex;align-items:center;gap:10px;"><span style="width:4px;height:16px;background:linear-gradient(180deg,var(--vspt-amber),var(--vspt-orange));border-radius:2px;"></span>Tabla de Control OPINONA — ${labelPeriodo}</span>
      <button class="admin-btn ${isAdmin?'active':''}" onclick="toggleAdmin()">${isAdmin?'🔓 EDICIÓN':'🔒 SOLO LECTURA'}</button>
    </div>
    <div class="chart-card accent full">
      <table class="table-obj">
        <thead><tr><th>Instalación</th><th>Meta Anual (%)</th><th>OPINONA Real (${labelPeriodo})</th><th>Δ (pp)</th><th>Desvío %</th></tr></thead>
        <tbody>`;
  lineas.forEach(l => {
    const target = targets[l.id].anual;
    const data = l.id === 'planta' ? filteredData : filteredData.filter(r => getLinea(r) === l.id.toUpperCase());
    const m = procesarMetricas(data);
    const real = m.opi;
    const varPp = real - target;
    const rel = target > 0 ? ((real - target)/target)*100 : 0;
    const ok = real >= target;
    const sign = ok ? '+' : '';
    const cls = ok ? 'olive' : 'red';
    const tdMeta = isAdmin
      ? `<input type="number" step="0.1" class="input-obj" value="${target}" onchange="saveTarget('${l.id}', this.value)">`
      : `<span style="font-size:16px;">${target}%</span>`;
    const tdReal = real > 0 ? `<span class="kpi-value ${cls}" style="font-size:20px;">${real.toFixed(1)}%</span>` : `<span style="color:var(--muted);font-style:italic;">S/D</span>`;
    html += `<tr>
      <td style="font-weight:800;text-transform:uppercase;font-size:13px;">${l.nombre}</td>
      <td>${tdMeta}</td>
      <td>${tdReal}</td>
      <td><span style="color:var(--${ok?'vspt-olive':'vspt-red'});font-weight:800;">${real>0?sign+varPp.toFixed(1):'—'}</span></td>
      <td><span style="color:var(--${ok?'vspt-olive':'vspt-red'});font-weight:800;">${real>0?sign+rel.toFixed(1)+'%':'—'}</span></td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  container.innerHTML = html;
}
